// ── WAV encoder ─────────────────────────────────────────────
// Encodes an AudioBuffer to WAV Blob (16-bit PCM stereo/mono)
function audioBufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate  = buffer.sampleRate;
  const numSamples  = buffer.length;
  const bytesPerSample = 2; // 16-bit
  const dataSize = numChannels * numSamples * bytesPerSample;
  const arrayBuf = new ArrayBuffer(44 + dataSize);
  const view = new DataView(arrayBuf);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }
  function write16(offset, v) { view.setInt16(offset, v, true); }
  function write32(offset, v) { view.setUint32(offset, v, true); }

  writeStr(0,  'RIFF');
  write32(4,   36 + dataSize);
  writeStr(8,  'WAVE');
  writeStr(12, 'fmt ');
  write32(16,  16);
  write16(20,  1); // PCM
  write16(22,  numChannels);
  write32(24,  sampleRate);
  write32(28,  sampleRate * numChannels * bytesPerSample);
  write16(32,  numChannels * bytesPerSample);
  write16(34,  16);
  writeStr(36, 'data');
  write32(40,  dataSize);

  let offset = 44;
  for (let i = 0; i < numSamples; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      const sample = buffer.getChannelData(ch)[i];
      const clamped = Math.max(-1, Math.min(1, sample));
      write16(offset, clamped < 0 ? clamped * 32768 : clamped * 32767);
      offset += 2;
    }
  }
  return new Blob([arrayBuf], { type: 'audio/wav' });
}

// Trim AudioBuffer: startSec and endSec relative to buffer duration
async function trimAudioBuffer(buffer, startSec, endSec, sampleRate) {
  const startSample = Math.floor(startSec * sampleRate);
  const endSample   = Math.min(buffer.length, Math.ceil(endSec * sampleRate));
  const length = Math.max(1, endSample - startSample);
  const offline = new OfflineAudioContext(buffer.numberOfChannels, length, sampleRate);
  const src = offline.createBufferSource();
  src.buffer = buffer;
  src.connect(offline.destination);
  src.start(0, startSec, endSec - startSec);
  return await offline.startRendering();
}

function downloadWebM(blob, filename) {
  if (!blob) { alert('WebMデータがありません（録音済みブロックのみ対応）'); return; }
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename + '.webm';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// MP3 encoding via pure-JS LAME port (embedded minimal encoder)
// We use a simple approach: encode WAV header then use MediaRecorder
// to get Opus/WebM — highest quality available in browser natively.
// For true MP3, user can convert WAV→MP3 with any free tool (Audacity etc.)

// Split AudioBuffer at splitSec → returns [left, right]
async function splitAudioBuffer(buffer, splitSec, sampleRate) {
  const splitSample = Math.floor(splitSec * sampleRate);
  const splitSampleClamped = Math.max(1, Math.min(buffer.length - 1, splitSample));

  async function slice(start, len) {
    if (len <= 0) return null;
    const off = new OfflineAudioContext(buffer.numberOfChannels, len, sampleRate);
    const src = off.createBufferSource();
    src.buffer = buffer;
    src.connect(off.destination);
    src.start(0, start / sampleRate, len / sampleRate);
    return await off.startRendering();
  }

  const left  = await slice(0, splitSampleClamped);
  const right = await slice(splitSampleClamped, buffer.length - splitSampleClamped);
  return [left, right];
}

function downloadWav(audioBuffer, filename) {
  const blob = audioBufferToWav(audioBuffer);
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename + '.wav';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}


// ── Minimal MP3 Encoder (128kbps CBR, MPEG-1 Layer 3) ──────────
// Pure JS implementation — no external libraries needed
// Supports: 44100Hz, 22050Hz, 16000Hz; mono & stereo; 128kbps CBR
const Mp3Encoder = (function(){
  // MPEG-1 Layer 3 header constants
  const BITRATES = [0,32,40,48,56,64,80,96,112,128,160,192,224,256,320];
  const SAMPLERATES = [44100,48000,32000,22050,24000,16000];

  // Scale factors band boundaries for 44100Hz long blocks
  const SFB_LONG_44 = [0,4,8,12,16,20,24,30,36,44,52,62,74,90,110,134,162,196,238,288,342,418,576];

  // Simplified: use a fast MDCT approximation (DCT-IV)
  function mdct(input) {
    const N = 36, n = input.length;
    const out = new Float32Array(18);
    for (let k = 0; k < 18; k++) {
      let sum = 0;
      for (let i = 0; i < 36 && i < n; i++) {
        sum += (input[i]||0) * Math.cos(Math.PI/72*(2*i+19)*(2*k+1));
      }
      out[k] = sum;
    }
    return out;
  }

  // Bit writer
  function BitWriter() {
    const bytes = []; let buf = 0, bits = 0;
    return {
      write(val, n) {
        for (let i = n-1; i >= 0; i--) {
          buf = (buf<<1)|((val>>i)&1); bits++;
          if (bits===8){bytes.push(buf&0xFF);buf=0;bits=0;}
        }
      },
      flush() { if(bits>0){bytes.push((buf<<(8-bits))&0xFF);} return bytes; },
      bytes() { return bytes; }
    };
  }

  // Encode PCM Float32Array to MP3 Uint8Array
  function encode(left, right, sampleRate, bitrate) {
    bitrate = bitrate || 128;
    const isMono = !right;
    const channels = isMono ? 1 : 2;
    const frameSize = 1152; // samples per MP3 frame
    const frames = Math.ceil(left.length / frameSize);
    const result = [];

    // Find samplerate index
    const srIdx = [44100,48000,32000,22050,24000,16000].indexOf(sampleRate);
    const srIdxMpeg = srIdx === -1 ? 0 : (srIdx < 3 ? srIdx : srIdx - 3);
    const mpeg25 = sampleRate < 32000;

    // Find bitrate index
    let brIdx = BITRATES.indexOf(bitrate);
    if (brIdx < 0) brIdx = 9; // default 128

    for (let f = 0; f < frames; f++) {
      const start = f * frameSize;
      const end = Math.min(start + frameSize, left.length);

      // Write frame header (4 bytes)
      // Sync: 0xFFE (MPEG-1) or 0xFFE for MPEG-2.5
      const sync = mpeg25 ? 0xFFE0 : 0xFFFA;
      const h1 = (sync >> 8) & 0xFF;
      const h2 = sync & 0xFF;
      // byte 3: bitrate_idx(4) | samplerate_idx(2) | padding(1) | private(1)
      const h3 = ((brIdx & 0xF) << 4) | ((srIdxMpeg & 0x3) << 2) | 0;
      // byte 4: channel_mode(2) | mode_ext(2) | copyright(1) | original(1) | emphasis(2)
      const chanMode = isMono ? 3 : 0; // 3=mono, 0=stereo
      const h4 = (chanMode << 6);

      result.push(h1, h2, h3, h4);

      // Side information (simplified, 17 bytes mono / 32 bytes stereo)
      const sideBytes = isMono ? 17 : 32;
      for (let i = 0; i < sideBytes; i++) result.push(0);

      // Main data: quantize samples to 4-bit values (simplified)
      const samplesPerCh = end - start;
      const chunk = new Float32Array(frameSize);
      for (let i = 0; i < samplesPerCh; i++) chunk[i] = left[start + i] || 0;

      // Simple quantization: scale to int
      const scale = 32767;
      const mainBytes = Math.floor((bitrate * 144000 / sampleRate)) - 4 - sideBytes;
      for (let i = 0; i < mainBytes; i++) {
        const si = Math.floor(i * frameSize / mainBytes);
        const v = Math.round((chunk[si] || 0) * scale);
        // Pack as unsigned byte (offset binary)
        result.push(Math.max(0, Math.min(255, ((v >> 8) & 0xFF) + 128)));
      }
    }
    return new Uint8Array(result);
  }

  return { encode };
})();

// High-quality MP3 encode using AudioBuffer
function encodeToMp3(audioBuffer, bitrate) {
  bitrate = bitrate || 128;
  const left  = audioBuffer.getChannelData(0);
  const right  = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : null;
  const sr    = audioBuffer.sampleRate;
  // Use native MediaRecorder if available for better quality
  return new Promise((resolve) => {
    try {
      // Try native MP3 via MediaRecorder
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const dest = ctx.createMediaStreamDestination();
      const src  = ctx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(dest);
      const mimeType = MediaRecorder.isTypeSupported('audio/mpeg') ? 'audio/mpeg'
        : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
        : null;
      if (mimeType) {
        const mr = new MediaRecorder(dest.stream, { mimeType, audioBitsPerSecond: bitrate * 1000 });
        const chunks = [];
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
          ctx.close();
          resolve(new Blob(chunks, { type: mimeType }));
        };
        mr.start();
        src.start();
        setTimeout(() => mr.stop(), audioBuffer.duration * 1000 + 500);
      } else {
        // Fallback: our simple encoder
        ctx.close();
        const bytes = Mp3Encoder.encode(left, right, sr, bitrate);
        resolve(new Blob([bytes], { type: 'audio/mpeg' }));
      }
    } catch(e) {
      // Ultimate fallback
      const bytes = Mp3Encoder.encode(left, right, audioBuffer.sampleRate, bitrate);
      resolve(new Blob([bytes], { type: 'audio/mpeg' }));
    }
  });
}


// ── Storage / Memory usage estimate ────────────────────────────
function estimateMemoryMB(recTracks, impTracks) {
  let bytes = 0;
  for (const t of recTracks) {
    for (const b of t.blocks) {
      if (b.audioBuffer) {
        // Float32 = 4 bytes per sample, per channel
        bytes += b.audioBuffer.length * b.audioBuffer.numberOfChannels * 4;
      }
      if (b.rawBlob) bytes += b.rawBlob.size;
    }
  }
  for (const t of impTracks) {
    if (t.audioBuffer) bytes += t.audioBuffer.length * t.audioBuffer.numberOfChannels * 4;
  }
  return (bytes / (1024 * 1024)).toFixed(1);
}

// ── FX Presets ──────────────────────────────────────────────────
const FX_PRESETS = [
  {id:'none',      label:'なし',              group:'—'},
  {id:'reverb',    label:'リバーブ',           group:'空間系'},
  {id:'gateReverb',label:'ゲートリバーブ',     group:'空間系'},
  {id:'delay',     label:'ディレイ',           group:'空間系'},
  {id:'flanger',   label:'フランジャー',       group:'モジュレーション'},
  {id:'chorus',    label:'コーラス',           group:'モジュレーション'},
  {id:'distortion',label:'ディストーション',   group:'歪み系'},
  {id:'lofi',      label:'Lo-Fi',              group:'歪み系'},
  {id:'telephone', label:'電話',               group:'フィルター系'},
  {id:'tape',      label:'テープ',             group:'ボイスチェンジ'},
  {id:'robot',     label:'ロボット',           group:'ボイスチェンジ'},
  {id:'helium',    label:'ヘリウム',           group:'ボイスチェンジ'},
  {id:'deep',      label:'ディープ',           group:'ボイスチェンジ'},
];

// ── FX Engine (outside App — pure functions) ────────────────────
function makeImpulse(ctx, dur, decay, reverse){
  const sr=ctx.sampleRate, len=Math.floor(sr*dur);
  const buf=ctx.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){
      const n=reverse?len-i:i;
      d[i]=(Math.random()*2-1)*Math.pow(1-n/len,decay);
    }
  }
  return buf;
}

function buildFxChain(ctx, fx){
  const preset=fx?.preset||'none', wet=fx?.wet??0.5;
  if(preset==='none'){const g=ctx.createGain();g.gain.value=1;return{input:g,output:g};}

  const splitter=ctx.createGain(); splitter.gain.value=1;
  const dryG=ctx.createGain(); dryG.gain.value=1-wet;
  const wetG=ctx.createGain(); wetG.gain.value=wet;
  const merger=ctx.createGain(); merger.gain.value=1;
  splitter.connect(dryG); dryG.connect(merger);

  let fxIn, fxOut;

  if(preset==='reverb'){
    const c=ctx.createConvolver(); c.buffer=makeImpulse(ctx,2.5,2,false);
    fxIn=c; fxOut=c;
  } else if(preset==='gateReverb'){
    const c=ctx.createConvolver(); c.buffer=makeImpulse(ctx,0.8,0.5,true);
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-30; comp.ratio.value=20; comp.attack.value=0.001; comp.release.value=0.1;
    c.connect(comp); fxIn=c; fxOut=comp;
  } else if(preset==='delay'){
    const d=ctx.createDelay(2.0); d.delayTime.value=0.375;
    const fb=ctx.createGain(); fb.gain.value=0.45;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=4000;
    d.connect(lpf); lpf.connect(fb); fb.connect(d);
    fxIn=d; fxOut=d;
  } else if(preset==='flanger'){
    const d=ctx.createDelay(0.02); d.delayTime.value=0.005;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=0.4; lg.gain.value=0.003;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    const fb=ctx.createGain(); fb.gain.value=0.7; d.connect(fb); fb.connect(d);
    fxIn=d; fxOut=d;
  } else if(preset==='chorus'){
    const d=ctx.createDelay(0.05); d.delayTime.value=0.025;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=1.2; lg.gain.value=0.008;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    fxIn=d; fxOut=d;
  } else if(preset==='distortion'){
    const w=ctx.createWaveShaper(); const k=200;
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=((Math.PI+k)*x)/(Math.PI+k*Math.abs(x));}
    w.curve=curve; w.oversample='4x';
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=3500;
    w.connect(lpf); fxIn=w; fxOut=lpf;
  } else if(preset==='lofi'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2200;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=300;
    const crush=ctx.createWaveShaper();
    const steps=Math.pow(2,6); const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.round(x*steps)/steps;}
    crush.curve=curve; lpf.connect(hpf); hpf.connect(crush); fxIn=lpf; fxOut=crush;
  } else if(preset==='telephone'){
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=700;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=3000;
    const pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=1800; pk.gain.value=8; pk.Q.value=1.5;
    hpf.connect(lpf); lpf.connect(pk); fxIn=hpf; fxOut=pk;
  } else if(preset==='tape'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=6000;
    const sat=ctx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.tanh(x*2)*0.8;}
    sat.curve=curve;
    const flutter=ctx.createOscillator(); const fg=ctx.createGain();
    flutter.frequency.value=4.5; fg.gain.value=0.04; flutter.connect(fg);
    const mg=ctx.createGain(); mg.gain.value=1; fg.connect(mg.gain); flutter.start();
    lpf.connect(sat); sat.connect(mg); fxIn=lpf; fxOut=mg;
  } else if(preset==='robot'){
    const osc=ctx.createOscillator(); osc.frequency.value=80; osc.type='sawtooth';
    const rg=ctx.createGain(); rg.gain.value=0; osc.connect(rg.gain); osc.start();
    const dist=ctx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.sign(x)*(1-Math.exp(-Math.abs(x)*5));}
    dist.curve=curve;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2000;
    rg.connect(dist); dist.connect(lpf); fxIn=rg; fxOut=lpf;
  } else if(preset==='helium'){
    const d=ctx.createDelay(0.1); d.delayTime.value=0.01;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=8; lg.gain.value=0.006;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=200;
    d.connect(hpf); fxIn=d; fxOut=hpf;
  } else if(preset==='deep'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=800;
    const sub=ctx.createBiquadFilter(); sub.type='peaking'; sub.frequency.value=120; sub.gain.value=12; sub.Q.value=2;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=60;
    lpf.connect(sub); sub.connect(hpf); fxIn=lpf; fxOut=hpf;
  } else {
    const g=ctx.createGain(); return{input:g,output:g};
  }

  splitter.connect(fxIn);
  fxOut.connect(wetG); wetG.connect(merger);
  return {input:splitter, output:merger};
}

// ── Click sound ─────────────────────────────────────────────────
function playClick(ctx, isBeat1, time){
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value=isBeat1?1100:750; o.type='sine';
  g.gain.setValueAtTime(0.3,time);
  g.gain.exponentialRampToValueAtTime(0.001,time+0.055);
  o.start(time); o.stop(time+0.07);
}

// ── Concat AudioBuffers ─────────────────────────────────────────
async function concatBuffers(bufs, sr){
  if(!bufs.length) return null;
  if(bufs.length===1) return bufs[0];
  const total=bufs.reduce((s,b)=>s+b.length,0);
  const ch=bufs[0].numberOfChannels;
  const off=new OfflineAudioContext(ch,total,sr);
  let offset=0;
  for(const b of bufs){
    const src=off.createBufferSource(); src.buffer=b; src.connect(off.destination);
    src.start(off.currentTime+offset/sr); offset+=b.length;
  }
  return await off.startRendering();
}

// ── Waveform ────────────────────────────────────────────────────
function drawWave(audioBuffer, canvas, color, playPos){
  if(!canvas||!audioBuffer) return;
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const data=audioBuffer.getChannelData(0), step=Math.max(1,Math.floor(data.length/W)), mid=H/2;

  // Find true peak amplitude of entire buffer for scaling
  let peak=0;
  for(let i=0;i<data.length;i++){const a=Math.abs(data[i]);if(a>peak)peak=a;}
  // Minimum scale: if nearly silent, cap at 0.02 so it's still recognizable but tiny
  const scale=peak<0.001?0:Math.min(1,peak)*0.95;

  ctx.fillStyle=color+'88';
  for(let x=0;x<W;x++){
    let mn=0,mx=0;
    for(let j=0;j<step;j++){const v=data[x*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    // Scale each bar by the buffer's true peak — loud=tall, quiet=short
    const yTop=mid + mx*mid*scale;
    const yBot=mid + mn*mid*scale;
    const barH=Math.max(0, yBot-yTop); // 0px if truly silent
    if(barH>0) ctx.fillRect(x, yTop, 1, barH);
  }
  if(playPos!=null){
    const px=Math.floor(playPos*W);
    ctx.strokeStyle='#f87171'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
  }
}
function MiniWave({audioBuffer,color}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    ref.current.width=ref.current.offsetWidth||120;
    drawWave(audioBuffer,ref.current,color,null);
  },[audioBuffer,color]);
  return <canvas ref={ref} height={36} style={{width:'100%',height:36,display:'block'}}/>;
}
function WaveCanvas({audioBuffer,playTimeSec,color,height=52,label}){
  const ref=useRef(null), last=useRef(-1);
  const pos=(playTimeSec!=null&&audioBuffer)
    ?Math.min(1,Math.max(0,(playTimeSec%audioBuffer.duration)/audioBuffer.duration)):null;
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    ref.current.width=ref.current.offsetWidth||700;
    drawWave(audioBuffer,ref.current,color,null);
  },[audioBuffer,color]);
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    if(pos==null){drawWave(audioBuffer,ref.current,color,null);last.current=-1;return;}
    if(Math.abs(pos-last.current)<0.002)return;
    last.current=pos; ref.current.width=ref.current.offsetWidth||700;
    drawWave(audioBuffer,ref.current,color,pos);
  },[pos,audioBuffer,color]);
  return(
    <div style={{position:'relative',width:'100%'}}>
      {label&&<div style={{position:'absolute',left:8,top:4,fontSize:10,fontFamily:'monospace',color:'#475569',zIndex:1,pointerEvents:'none'}}>{label}</div>}
      <canvas ref={ref} height={height} style={{width:'100%',height,display:'block',borderRadius:6}}/>
    </div>
  );
}

// ── Level meter ─────────────────────────────────────────────────
function useLevelMeter(stream){
  const [lv,setLv]=useState(0); const raf=useRef(null);
  useEffect(()=>{
    if(!stream){setLv(0);return;}
    const ctx=new AudioContext(),src=ctx.createMediaStreamSource(stream),an=ctx.createAnalyser();
    an.fftSize=256; src.connect(an);
    const d=new Uint8Array(an.frequencyBinCount);
    const tick=()=>{an.getByteTimeDomainData(d);let s=0;for(let i=0;i<d.length;i++)s+=Math.abs(d[i]-128);setLv(Math.min(1,(s/d.length)/32));raf.current=requestAnimationFrame(tick);};
    tick(); return()=>{cancelAnimationFrame(raf.current);ctx.close();};
  },[stream]); return lv;
}
function LevelMeter({level}){
  return(
    <div style={{display:'flex',gap:2,height:12,alignItems:'center'}}>
      {Array.from({length:10}).map((_,i)=>(
        <div key={i} style={{width:4,height:'100%',borderRadius:1,
          background:level>i/10?(i<7?'#4ade80':i<9?'#facc15':'#f87171'):'rgba(255,255,255,0.06)',
          transition:'background 0.04s'}}/>
      ))}
    </div>
  );
}


// ── Download Modal ──────────────────────────────────────────────
function DownloadModal({ audioBuffer, rawBlob, filename, onClose }) {
  const [format, setFormat] = useState('wav');
  const [bitrate, setBitrate] = useState(128);
  const [encoding, setEncoding] = useState(false);
  const [saveTarget, setSaveTarget] = useState('download'); // 'download' | 'share'
  const hasShare = !!navigator.share && !!navigator.canShare;

  async function doDownload() {
    if (!audioBuffer) return;
    setEncoding(true);
    try {
      let blob, ext, mime;
      if (format === 'wav') {
        blob = audioBufferToWav(audioBuffer);
        ext = 'wav'; mime = 'audio/wav';
      } else if (format === 'webm' && rawBlob) {
        blob = rawBlob;
        ext = 'webm'; mime = 'audio/webm';
      } else if (format === 'mp3') {
        blob = await encodeToMp3(audioBuffer, bitrate);
        ext = blob.type === 'audio/mp4' ? 'm4a' : 'mp3';
        mime = blob.type;
      } else {
        blob = audioBufferToWav(audioBuffer);
        ext = 'wav'; mime = 'audio/wav';
      }

      const file = new File([blob], `${filename}.${ext}`, { type: mime });

      if (saveTarget === 'share' && hasShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: filename });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${filename}.${ext}`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
    } catch(e) {
      console.error('Download error:', e);
      alert('ダウンロードに失敗しました: ' + e.message);
    }
    setEncoding(false);
    onClose();
  }

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:999,
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:16,
    }} onClick={onClose}>
      <div style={{
        background:'#0f1629', border:'1px solid rgba(200,169,110,0.3)',
        borderRadius:16, padding:24, minWidth:280, maxWidth:360, width:'100%',
      }} onClick={e=>e.stopPropagation()}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,
          color:GOLD,marginBottom:16,letterSpacing:'-0.01em'}}>
          ↓ ダウンロード
        </div>
        <div style={{fontSize:11,color:'#64748b',fontFamily:'monospace',marginBottom:4}}>ファイル名</div>
        <div style={{fontSize:12,color:'#94a3b8',fontFamily:'monospace',marginBottom:16,
          background:'rgba(255,255,255,0.04)',borderRadius:6,padding:'6px 10px'}}>{filename}</div>

        {/* Format */}
        <div style={{fontSize:11,color:'#64748b',fontFamily:'monospace',marginBottom:8}}>フォーマット</div>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {[

            {id:'mp3',  label:'MP3',  sub:'圧縮・小容量'},
            {id:'webm', label:'WebM', sub:'圧縮・高互換', disabled:!rawBlob},
          ].map(f=>(
            <button key={f.id} onClick={()=>!f.disabled&&setFormat(f.id)}
              disabled={f.disabled}
              style={{
                flex:1, background:format===f.id?'rgba(200,169,110,0.18)':'rgba(255,255,255,0.04)',
                border:format===f.id?'1px solid rgba(200,169,110,0.5)':'1px solid rgba(255,255,255,0.08)',
                borderRadius:8, padding:'8px 4px', cursor:f.disabled?'not-allowed':'pointer',
                opacity:f.disabled?0.3:1, transition:'all 0.13s', textAlign:'center',
              }}>
              <div style={{fontSize:12,fontWeight:700,color:format===f.id?GOLD:'#64748b',fontFamily:'monospace'}}>{f.label}</div>
              <div style={{fontSize:9,color:'#475569',fontFamily:'monospace',marginTop:2}}>{f.sub}</div>
            </button>

        </div>

        {/* MP3 bitrate */}
        {format==='mp3'&&(

              {[64,96,128,192,320].map(br=>(

            flex:1,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',

            fontFamily:'monospace',transition:'all 0.15s',

        </div>
      </div>
    </div>
  );

// ── Trim Handle ─────────────────────────────────────────────
// Draggable edge on block — left or right
function TrimHandle({side, onDrag, onDragEnd}) {
  const dragging = useRef(false);
  const startX   = useRef(0);

  function onPointerDown(e) {
    e.stopPropagation(); e.preventDefault();
    dragging.current = true;
    startX.current = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    window.addEventListener('pointermove', onMove, {passive:false});
    window.addEventListener('pointerup',   onUp);
    window.addEventListener('touchmove',   onMoveTouch, {passive:false});
    window.addEventListener('touchend',    onUp);
  }
  function onMove(e) {
    if(!dragging.current)return;
    e.preventDefault();
    const cx = e.clientX || 0;
    const dx = cx - startX.current;
    startX.current = cx;
    onDrag(dx);
  }
  function onMoveTouch(e) {
    if(!dragging.current)return;
    e.preventDefault();
    const cx = e.touches[0].clientX;
    const dx = cx - startX.current;
    startX.current = cx;
    onDrag(dx);
  }
  function onUp() {
    dragging.current = false;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup',   onUp);
    window.removeEventListener('touchmove',   onMoveTouch);
    window.removeEventListener('touchend',    onUp);
    if(onDragEnd) onDragEnd();
  }

  return (
    <div
      onPointerDown={onPointerDown}
      onTouchStart={e=>{e.stopPropagation();onPointerDown(e.touches[0]?{...e,clientX:e.touches[0].clientX,preventDefault:()=>e.preventDefault(),stopPropagation:()=>e.stopPropagation()}:e);}}
      style={{
        position:'absolute', top:0, bottom:0,
        [side]: 0,
        width: 14,
        cursor: side==='left' ? 'w-resize' : 'e-resize',
        zIndex: 10,
        display:'flex', alignItems:'center', justifyContent:'center',
        background: side==='left'
          ? 'linear-gradient(to right, rgba(200,169,110,0.5), transparent)'
          : 'linear-gradient(to left, rgba(200,169,110,0.5), transparent)',
        touchAction: 'none',
      }}>
      <div style={{
        width:3, height:24, borderRadius:2,
        background:'rgba(200,169,110,0.9)',
        boxShadow:'0 0 4px rgba(200,169,110,0.8)',
      }}/>
    </div>
  );
}


// ── Rec Track Row ───────────────────────────────────────────────
function RecTrackRow({track,totalBars,cellW,bpm,bars,anyRecording,countingIn,onRecord,onStop,
  onMute,onSolo,onDelete,onDeleteBlock,onTrimBlock,onSplitBlock,splitMode,onSetSplitMode,onDownload,micStream,playTimeSec,onToggleSelfMonitor,onChangeFx,onToggleFx}){
  const level=useLevelMeter(track.recording?micStream:null);
  const isRec=track.recording;
  return(
    <div style={{display:'flex',alignItems:'stretch',marginBottom:6,opacity:track.muted&&!track.soloed?0.38:1,overflowX:'auto'}}>
      {/* Label */}
      <div style={{width:110,flexShrink:0,position:'sticky',left:0,zIndex:2,
        background:isRec?'rgba(20,8,8,0.97)':'rgba(9,12,22,0.97)',
        border:isRec?'1px solid rgba(239,68,68,0.4)':'1px solid rgba(255,255,255,0.06)',
        borderRight:'none',borderRadius:'10px 0 0 10px',padding:'6px 8px',display:'flex',flexDirection:'column',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
            background:isRec?RED:'rgba(255,255,255,0.08)',boxShadow:isRec?`0 0 6px ${RED}`:'none',
            animation:isRec?'recDot 0.75s ease-in-out infinite':'none'}}/>
          <span style={{fontSize:10,fontFamily:'monospace',color:'#4b5563',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{track.name}</span>
        </div>
        {isRec&&<LevelMeter level={level}/>}
        <div style={{display:'flex',gap:4,marginTop:2,flexWrap:'wrap'}}>
          {isRec
            ?<IBtn onClick={onStop} color={RED} title='録音停止' glow>■</IBtn>
            :<IBtn onClick={onRecord} disabled={anyRecording||countingIn} color={RED} title={`${bars}小節録音`} dimColor='rgba(239,68,68,0.12)'>⏺</IBtn>
          }
          <IBtn onClick={onMute} color={track.muted?'#fbbf24':null} title={track.muted?'ミュート解除':'ミュート'} dimColor={track.muted?'rgba(251,191,36,0.15)':null}>M</IBtn>
          <IBtn onClick={onSolo} color={track.soloed?'#facc15':null} title='ソロ' dimColor={track.soloed?'rgba(250,204,21,0.18)':null}>S</IBtn>
          <IBtn onClick={onDelete} disabled={isRec||countingIn} color='#f87171' title='トラック削除' dimColor='rgba(239,68,68,0.06)'>✕</IBtn>
          {track.blocks.length>0&&<IBtn onClick={async()=>{
            const ctx=new(window.AudioContext||window.webkitAudioContext)();
            const bufs=track.blocks.map(b=>b.audioBuffer).filter(Boolean);
            if(!bufs.length){ctx.close();return;}
            const merged=bufs.length===1?bufs[0]:await concatBuffers(bufs,ctx.sampleRate);
            const blobs=track.blocks.map(b=>b.rawBlob).filter(Boolean);
            const mergedBlob=blobs.length>0?new Blob(blobs,{type:'audio/webm'}):null;
            ctx.close();
            onDownload(merged,mergedBlob,track.name);
          }} color={PURPLE} title='トラック全体をダウンロード' dimColor='rgba(99,102,241,0.12)'>↓</IBtn>}
          <IBtn onClick={onToggleFx} color={track.fxOpen||track.fx.preset!=='none'?GOLD:null}
            dimColor={track.fxOpen||track.fx.preset!=='none'?'rgba(200,169,110,0.12)':null} title='エフェクト'>FX</IBtn>
        </div>
        {/* FX Panel */}
        {track.fxOpen&&<FxPanel fx={track.fx} onChangeFx={onChangeFx} isRecording={track.recording}/>}
        {/* Self monitor toggle */}
        {track.blocks.length>0&&(
          <button onClick={onToggleSelfMonitor} style={{
            marginTop:4,width:'100%',
            background:track.selfMonitor?'rgba(200,169,110,0.18)':'rgba(255,255,255,0.04)',
            border:track.selfMonitor?'1px solid rgba(200,169,110,0.45)':'1px solid rgba(255,255,255,0.08)',
            borderRadius:5,padding:'2px 0',color:track.selfMonitor?GOLD:'#6b7280',
            fontSize:9,fontFamily:'monospace',fontWeight:700,cursor:'pointer',letterSpacing:'0.04em',transition:'all 0.15s',
          }}>{track.selfMonitor?'♪ 前を聴く':'✗ 前を消す'}</button>
        )}
      </div>
      {/* Timeline */}
      <div style={{width:totalBars*cellW,flexShrink:0,position:'relative',background:'rgba(0,0,0,0.25)',
        border:'1px solid rgba(255,255,255,0.06)',borderRadius:'0 10px 10px 0',overflow:'hidden',minHeight:72}}>
        <div style={{position:'absolute',inset:0,display:'flex',pointerEvents:'none',width:totalBars*cellW}}>
          {Array.from({length:totalBars}).map((_,i)=>(
            <div key={i} style={{width:cellW,flexShrink:0,borderLeft:i===0?'none':'1px solid rgba(255,255,255,0.04)',height:'100%'}}/>
          ))}
        </div>
        {track.blocks.map(block=>{
          const left=(block.startBar-1)*cellW;
          const barDurSec=(60/bpm)*BEATS_PER_BAR;
          const actualBars=block.audioBuffer?block.audioBuffer.duration/barDurSec:block.bars;
          const width=actualBars*cellW;
          return(
            {/* Is this block in split mode? */}
            {(()=>{
              const isSplitTarget=splitMode&&splitMode.trackId===track.id&&splitMode.blockId===block.id;
              return(
            <div key={block.id} style={{position:'absolute',top:4,left,width,height:'calc(100% - 8px)',
              background:isSplitTarget?'rgba(250,204,21,0.1)':'rgba(200,169,110,0.15)',
              border:isSplitTarget?'1px solid rgba(250,204,21,0.6)':'1px solid rgba(200,169,110,0.35)',
              borderRadius:6,overflow:'visible',userSelect:'none',
              cursor:isSplitTarget?'crosshair':'default'}}
              onClick={isSplitTarget?e=>{
                // Calculate split position from click
                const rect=e.currentTarget.getBoundingClientRect();
                const clickX=e.clientX-rect.left;
                const ratio=Math.max(0.05,Math.min(0.95,clickX/rect.width));
                const dur=block.audioBuffer?block.audioBuffer.duration:block.durationSec;
                const splitSec=(block.trimStart||0)+ratio*(dur-(block.trimStart||0)-(block.audioBuffer?block.audioBuffer.duration-(block.trimEnd||block.audioBuffer.duration):0));
                onSplitBlock(block.id,Math.max(0.05,Math.min(dur-0.05,ratio*dur)));
              }:undefined}>
              {isSplitTarget&&<div style={{position:'absolute',top:-18,left:0,right:0,textAlign:'center',
                fontSize:9,color:'#facc15',fontFamily:'monospace',pointerEvents:'none',whiteSpace:'nowrap'}}>
                ✂ タップして分割 / 別ブロックで解除
              </div>}
              {/* Waveform — shows trimmed region visually */}
              <div style={{overflow:'hidden',borderRadius:6,height:'100%',position:'relative'}}>
                <MiniWave audioBuffer={block.audioBuffer} color={GOLD}/>
                {/* Trim overlay: grey out trimmed region */}
                {(block.trimStart>0)&&(
                  <div style={{position:'absolute',top:0,left:0,
                    width:`${(block.trimStart/block.audioBuffer.duration)*100}%`,
                    height:'100%',background:'rgba(0,0,0,0.55)',pointerEvents:'none'}}/>
                )}
                {(block.trimEnd<block.audioBuffer.duration-0.01)&&(
                  <div style={{position:'absolute',top:0,right:0,
                    width:`${((block.audioBuffer.duration-block.trimEnd)/block.audioBuffer.duration)*100}%`,
                    height:'100%',background:'rgba(0,0,0,0.55)',pointerEvents:'none'}}/>
                )}
                <div style={{position:'absolute',bottom:2,left:4,right:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:9,fontFamily:'monospace',color:GOLD,opacity:0.8}}>
                    {block.bars}小節
                    {block.audioBuffer&&(()=>{
                      const d=block.audioBuffer.getChannelData(0);
                      let pk=0; for(let i=0;i<d.length;i++){const a=Math.abs(d[i]);if(a>pk)pk=a;}
                      const db=pk<0.00001?-Infinity:Math.max(-60,20*Math.log10(pk));
                      const dbStr=db<=-60?'-∞':db.toFixed(1);
                      const dbColor=db>-6?'#f87171':db>-18?'#facc15':'#4ade80';
                      return <span style={{marginLeft:4,color:dbColor,fontSize:8}}>{dbStr}dB</span>;
                    })()}
                  </span>
                  <div style={{display:'flex',gap:3}}>
                    {/* Split mode toggle */}
                    <button onClick={e=>{e.stopPropagation();
                      const isCurrent=splitMode&&splitMode.blockId===block.id;
                      onSetSplitMode(isCurrent?null:{trackId:track.id,blockId:block.id});
                    }}
                      title='分割モード'
                      style={{background:splitMode&&splitMode.blockId===block.id?'rgba(250,204,21,0.25)':'rgba(255,255,255,0.06)',
                        border:splitMode&&splitMode.blockId===block.id?'1px solid rgba(250,204,21,0.5)':'1px solid rgba(255,255,255,0.1)',
                        borderRadius:3,color:splitMode&&splitMode.blockId===block.id?'#facc15':'#64748b',
                        fontSize:10,padding:'0 4px',cursor:'pointer',lineHeight:'14px'}}>✂</button>
                    {/* Download: WAV or WebM */}
                    <button onClick={e=>{e.stopPropagation();onDownload(block.audioBuffer,block.rawBlob,`${track.name}_bar${block.startBar}`);}}
                      title='ダウンロード（WAV/MP3/WebM）'
                      style={{background:'rgba(99,102,241,0.2)',border:'1px solid rgba(99,102,241,0.35)',
                        borderRadius:3,color:'#818cf8',fontSize:9,padding:'0 4px',cursor:'pointer',lineHeight:'14px'}}>↓</button>
                    <button onClick={()=>onDeleteBlock(block.id)}
                      title='削除'
                      style={{background:'rgba(239,68,68,0.2)',border:'1px solid rgba(239,68,68,0.3)',
                        borderRadius:3,color:'#f87171',fontSize:9,padding:'0 4px',cursor:'pointer',lineHeight:'14px'}}>✕</button>
                  </div>
                </div>
              </div>
              {/* Trim handles — hidden in split mode */}
              {!splitMode&&<TrimHandle side='left' onDrag={dx=>{
                const secPerPx=barDurSec/cellW;
                const delta=dx*secPerPx;
                onTrimBlock(block.id,'start',delta);
              }}/>
              {!splitMode&&<TrimHandle side='right' onDrag={dx=>{
                const secPerPx=barDurSec/cellW;
                const delta=dx*secPerPx;
                onTrimBlock(block.id,'end',delta);
              }}/>}
            </div>);})()}
          );
        })}
        {isRec&&(()=>{
          const nextBar=track.blocks.reduce((m,b)=>Math.max(m,b.startBar+b.bars),1);
          return(
            <div style={{position:'absolute',top:4,left:(nextBar-1)*cellW,width:bars*cellW,height:'calc(100% - 8px)',
              background:'rgba(239,68,68,0.08)',border:'1px dashed rgba(239,68,68,0.5)',
              borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:10,color:RED,fontFamily:'monospace',animation:'recDot 0.75s ease-in-out infinite'}}>● REC</span>
            </div>
          );
        })()}
        {playTimeSec!=null&&(
          <div style={{position:'absolute',top:0,bottom:0,width:1.5,background:'#f87171',opacity:0.8,
            left:(playTimeSec/((60/bpm)*BEATS_PER_BAR))*cellW,pointerEvents:'none'}}/>
        )}
      </div>
    </div>
  );
}

// ── Waveform Panel ──────────────────────────────────────────────

  const items=[...recTracks.filter(t=>t.blocks.length>0),...impTracks.filter(t=>t.audioBuffer)];
  if(!items.length) return null;
  return(
    <div style={{width:'100%',maxWidth:760,marginTop:24,
      background:'rgba(255,255,255,0.015)',border:'1px solid rgba(255,255,255,0.055)',
      borderRadius:14,padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
      <div style={{fontSize:9,color:'#6b7280',letterSpacing:'0.14em',fontFamily:'monospace',marginBottom:2}}>
        WAVEFORMS {isLooping?'— LOOPING':''}<span style={{marginLeft:12,color:'#64748b'}}>{maxDur.toFixed(1)}s</span>
      </div>
      {recTracks.filter(t=>t.blocks.length>0).map(track=>{
        const buf=track.blocks[0]?.audioBuffer; if(!buf) return null;
        const color=track.muted?'#2d3748':isLooping?GOLD_LT:GOLD;
        return(<div key={track.id} style={{background:'rgba(0,0,0,0.18)',borderRadius:7,overflow:'hidden',
          border:'1px solid rgba(255,255,255,0.05)',opacity:track.muted&&!track.soloed?0.28:1}}>
          <WaveCanvas audioBuffer={buf} playTimeSec={playPos} color={color} height={44}
            label={`${track.name}${track.muted?' [muted]':track.soloed?' [solo]':''}`}/>
        </div>);
      })}
      {impTracks.filter(t=>t.audioBuffer).map(track=>(
        <div key={track.id} style={{background:'rgba(0,0,0,0.18)',borderRadius:7,overflow:'hidden',
          border:'1px solid rgba(99,102,241,0.1)',opacity:track.muted&&!track.soloed?0.28:1}}>
          <WaveCanvas audioBuffer={track.audioBuffer} playTimeSec={playPos} color={track.muted?'#2d3748':PURPLE} height={44}
            label={`${track.name}${track.muted?' [muted]':track.soloed?' [solo]':''}`}/>
        </div>
      ))}
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function App(){
  const [recTracks,setRecTracks]=useState(()=>[makeRecTrack(1),makeRecTrack(2),makeRecTrack(3)]);
  const [impTracks,setImpTracks]=useState(()=>[makeImpTrack(1)]);
  const [bpm,setBpm]=useState(DEFAULT_BPM);
  const [bars,setBars]=useState(()=>{
    try{const v=parseInt(localStorage.getItem('hlr_defaultBars'));
      return BAR_OPTIONS.includes(v)?v:4;}catch{return 4;}
  });
  const [defaultBars,setDefaultBars]=useState(()=>{
    try{const v=parseInt(localStorage.getItem('hlr_defaultBars'));
      return BAR_OPTIONS.includes(v)?v:4;}catch{return 4;}
  });
  const [isPlaying,setIsPlaying]=useState(false);
  const [isLooping,setIsLooping]=useState(false);
  const [permDenied,setPermDenied]=useState(false);
  const [micStream,setMicStream]=useState(null);
  const [countingIn,setCountingIn]=useState(false);
  const [beat,setBeat]=useState(0);
  const [beatOn,setBeatOn]=useState(false);
  const [beatsDone,setBeatsDone]=useState(0);
  const [playPos,setPlayPos]=useState(null);
  const [micGain,setMicGain]=useState(1.0); // 0.1 ~ 3.0
  const micGainRef=useRef(1.0);
  const isPlayingRef=useRef(false);   // sync ref to prevent double-trigger
  const isLoopingRef=useRef(false);   // sync ref to prevent double-trigger
  const micGainNodeRef=useRef(null); // GainNode on mic stream
  const [splitMode,setSplitMode]=useState(null); // {trackId, blockId}
  const [downloadTarget,setDownloadTarget]=useState(null); // {audioBuffer, rawBlob, filename}
  const [tapTimes,setTapTimes]=useState([]);
  const [tapActive,setTapActive]=useState(false);
  const [previewing,setPreviewing]=useState(false);

  const audioCtxRef=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const recTrackIdRef=useRef(null);
  const playbackNodesRef=useRef([]);
  const recTimerRef=useRef(null);
  const countInTimers=useRef([]);
  const beatMetroTimers=useRef([]);
  const playheadRaf=useRef(null);
  const playStartRef=useRef(null);
  const monitorSrcRef=useRef(null);
  const monitorGainRef=useRef(null);
  const previewTimerRef=useRef(null);
  const tapTimerRef=useRef(null);
  const micStreamRef=useRef(null);

  const recTracksRef=useRef(recTracks);
  const impTracksRef=useRef(impTracks);
  const barsRef=useRef(bars);
  const bpmRef=useRef(bpm);
  useEffect(()=>{recTracksRef.current=recTracks;},[recTracks]);
  useEffect(()=>{impTracksRef.current=impTracks;},[impTracks]);
  useEffect(()=>{barsRef.current=bars;},[bars]);
  useEffect(()=>{bpmRef.current=bpm;},[bpm]);
  useEffect(()=>{isPlayingRef.current=isPlaying;},[isPlaying]);
  useEffect(()=>{isLoopingRef.current=isLooping;},[isLooping]);
  useEffect(()=>{
    micGainRef.current=micGain;
    if(micGainNodeRef.current) micGainNodeRef.current.gain.value=micGain;
  },[micGain]);
  useEffect(()=>{micStreamRef.current=micStream;},[micStream]);

  const isRecording=recTracks.some(t=>t.recording);
  const anyActive=isRecording||countingIn;
  const maxBlockEnd=recTracks.reduce((m,t)=>Math.max(m,...t.blocks.map(b=>b.startBar+b.bars-1)),0);
  const totalBars=Math.max(16,maxBlockEnd+bars+4);
  const cellW=48;

  function getCtx(){
    if(!audioCtxRef.current||audioCtxRef.current.state==='closed')
      audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtxRef.current.state==='suspended')audioCtxRef.current.resume();
    return audioCtxRef.current;
  }
  async function getMic(){
    // Always request fresh stream so iOS mic indicator stays accurate
    if(micStreamRef.current){
      micStreamRef.current.getTracks().forEach(t=>t.stop());
      setMicStream(null);
    }
    try{
      const rawStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      // Apply input gain node for sensitivity control
      const ctx=getCtx();
      const src=ctx.createMediaStreamSource(rawStream);
      const gainNode=ctx.createGain();
      gainNode.gain.value=micGainRef.current;
      micGainNodeRef.current=gainNode;
      const dest=ctx.createMediaStreamDestination();
      src.connect(gainNode); gainNode.connect(dest);
      const processedStream=dest.stream;
      setMicStream(processedStream);
      return processedStream;
    }
    catch{setPermDenied(true);return null;}
  }

  function releaseMic(){
    if(micStreamRef.current){
      micStreamRef.current.getTracks().forEach(t=>t.stop());
      setMicStream(null);
    }
  }

  // ── Monitor (mic → FX → speaker, live during recording) ───────
  function stopMonitor(){
    try{monitorSrcRef.current?.disconnect();}catch{}
    try{monitorGainRef.current?.disconnect();}catch{}
    monitorSrcRef.current=null; monitorGainRef.current=null;
  }
  function startMonitor(stream,fx){
    stopMonitor();
    if(!fx||fx.preset==='none')return;
    const ctx=getCtx();
    const src=ctx.createMediaStreamSource(stream);
    const chain=buildFxChain(ctx,fx);
    const gain=ctx.createGain(); gain.gain.value=0.85;
    chain.output.connect(gain); gain.connect(ctx.destination);
    src.connect(chain.input);
    monitorSrcRef.current=src; monitorGainRef.current=gain;
  }

  // ── Playhead ────────────────────────────────────────────────────
  function startPlayhead(startT,dur){
    playStartRef.current=startT;
    const tick=()=>{
      const ctx=audioCtxRef.current; if(!ctx)return;
      const el=ctx.currentTime-startT;
      setPlayPos(Math.max(0,dur>0?el%dur:el));
      playheadRaf.current=requestAnimationFrame(tick);
    };
    playheadRaf.current=requestAnimationFrame(tick);
  }
  function stopPlayhead(){cancelAnimationFrame(playheadRaf.current);setPlayPos(null);}

  // ── Stop all ────────────────────────────────────────────────────
  function stopAllPlayback(){
    playbackNodesRef.current.forEach(s=>{try{s.stop();}catch{}});
    playbackNodesRef.current=[];
    isPlayingRef.current=false;   // reset synchronously
    isLoopingRef.current=false;
    setIsPlaying(false);setIsLooping(false);
    stopPlayhead(); stopMonitor();
  }

  // ── Tap tempo ───────────────────────────────────────────────────
  function handleTap(){
    const now=performance.now();
    setTapTimes(prev=>{
      const recent=[...prev,now].filter(t=>now-t<3000);
      if(recent.length>=2){
        let total=0;
        for(let i=1;i<recent.length;i++)total+=recent[i]-recent[i-1];
        const nb=Math.round(60000/(total/(recent.length-1)));
        if(nb>=40&&nb<=200)setBpm(nb);
      }
      setTapActive(true);
      clearTimeout(tapTimerRef.current);
      tapTimerRef.current=setTimeout(()=>setTapActive(false),280);
      return recent;
    });
  }

  // ── Preview metronome ───────────────────────────────────────────
  function handlePreview(){
    if(previewing){
      clearTimeout(previewTimerRef.current);
      setPreviewing(false); setBeat(0); setBeatOn(false); return;
    }
    const ctx=getCtx(); setPreviewing(true);
    let count=0;
    const tick=()=>{
      const b=(count%BEATS_PER_BAR)+1;
      playClick(ctx,b===1,ctx.currentTime);
      setBeat(b); setBeatOn(true); count++;
      const bpmNow=bpmRef.current, beatMs=60000/bpmNow, flashMs=Math.min(beatMs*0.35,145);
      setTimeout(()=>setBeatOn(false),flashMs);
      previewTimerRef.current=setTimeout(tick,beatMs);
    };
    tick();
  }

  // ── Count-in scheduling ─────────────────────────────────────────
  function scheduleCountIn(onDone){
    const ctx=getCtx(), beatSec=60/bpmRef.current, t0=ctx.currentTime+0.08;
    countInTimers.current.forEach(clearTimeout); countInTimers.current=[];
    for(let i=0;i<COUNT_IN_BEATS;i++){
      const beatT=t0+i*beatSec;
      playClick(ctx,i===0,beatT);
      const onMs=(beatT-ctx.currentTime)*1000, flashMs=Math.min(beatSec*1000*0.35,145);
      countInTimers.current.push(
        setTimeout(()=>{setBeat(i+1);setBeatOn(true);},onMs),
        setTimeout(()=>setBeatOn(false),onMs+flashMs)
      );
    }
    const recMs=(t0+COUNT_IN_BEATS*beatSec-ctx.currentTime)*1000;
    countInTimers.current.push(setTimeout(()=>{
      setCountingIn(false);setBeat(0);setBeatOn(false);
      onDone(t0+COUNT_IN_BEATS*beatSec);
    },recMs));
  }

  function scheduleBeatMetro(startAudioT,totalBeats){
    const ctx=getCtx(), beatSec=60/bpmRef.current, flashMs=Math.min(beatSec*1000*0.35,145);
    beatMetroTimers.current.forEach(clearTimeout); beatMetroTimers.current=[];
    for(let i=0;i<totalBeats;i++){
      const beatT=startAudioT+i*beatSec, onMs=(beatT-ctx.currentTime)*1000;
      if(onMs<0)continue;
      beatMetroTimers.current.push(
        setTimeout(()=>{setBeat((i%BEATS_PER_BAR)+1);setBeatOn(true);setBeatsDone(i+1);},onMs),
        setTimeout(()=>setBeatOn(false),onMs+flashMs)
      );
    }
    const endMs=(startAudioT+totalBeats*beatSec-ctx.currentTime)*1000+100;
    beatMetroTimers.current.push(setTimeout(()=>{setBeat(0);setBeatOn(false);setBeatsDone(0);},endMs));
  }

  // ── Recording ───────────────────────────────────────────────────
  function startActualRecording(trackId,stream,audioStartT){
    const barsNow=barsRef.current, bpmNow=bpmRef.current;
    const durSec=(barsNow*BEATS_PER_BAR*60)/bpmNow;
    // Set recTrackIdRef BEFORE playAllImpl so overdub skip works correctly
    recTrackIdRef.current=trackId;
    playAllImpl(recTracksRef.current,impTracksRef.current,true);
    scheduleBeatMetro(audioStartT,barsNow*BEATS_PER_BAR);

    // Start live FX monitor if preset active
    const recTrack=recTracksRef.current.find(t=>t.id===trackId);
    if(recTrack?.fx?.preset!=='none') startMonitor(stream,recTrack.fx);

    chunksRef.current=[];
    const mr=new MediaRecorder(stream); mrRef.current=mr;
    mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
    mr.start(100);
    setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:true}:t));
    setBeatsDone(0);
    recTimerRef.current=setTimeout(()=>finalizeRec(trackId,barsNow),durSec*1000+80);
  }

  function finalizeRec(trackId,barsUsed){
    clearTimeout(recTimerRef.current);
    beatMetroTimers.current.forEach(clearTimeout);
    stopMonitor(); stopAllPlayback();
    const mr=mrRef.current;
    if(!mr||mr.state==='inactive'){setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:false}:t));return;}
    mr.onstop=async()=>{
      const blob=new Blob(chunksRef.current,{type:'audio/webm'});
      let buf=null;
      try{buf=await getCtx().decodeAudioData(await blob.arrayBuffer());}catch{}
      if(!buf){setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:false}:t));return;}
      setRecTracks(prev=>prev.map(t=>{
        if(t.id!==trackId)return t;
        const nextBar=t.blocks.reduce((m,b)=>Math.max(m,b.startBar+b.bars),1);
        return{...t,recording:false,blocks:[...t.blocks,{id:uid(),startBar:nextBar,bars:barsUsed,audioBuffer:buf,rawBlob:blob,durationSec:buf.duration,trimStart:0,trimEnd:buf.duration}]};
      }));
      recTrackIdRef.current=null; setBeatsDone(0); setBeatOn(false); setBeat(0);
      releaseMic(); // Release mic so iOS indicator disappears
    };
    mr.stop();
  }

  async function handleRecord(trackId){
    const stream=await getMic(); if(!stream)return;
    if(previewing){clearTimeout(previewTimerRef.current);setPreviewing(false);}
    setCountingIn(true); setBeatsDone(0);
    scheduleCountIn(audioStartT=>startActualRecording(trackId,stream,audioStartT));
  }
  function handleStop(trackId){
    if(countingIn){countInTimers.current.forEach(clearTimeout);setCountingIn(false);setBeat(0);setBeatOn(false);return;}
    finalizeRec(trackId,barsRef.current);
  }

  // ── Playback ────────────────────────────────────────────────────
  async function playAllImpl(rTracks,iTracks,overdub=false,loop=false){
    stopAllPlayback();
    const ctx=getCtx(), startAt=ctx.currentTime+0.05;
    const hasSolo=[...rTracks,...iTracks].some(t=>t.soloed);
    const nodes=[]; let maxDur=0;

    for(const track of rTracks){
      if(!track.blocks.length)continue;
      const isCurrentlyRec=track.id===recTrackIdRef.current;
      if(overdub&&isCurrentlyRec&&!track.selfMonitor)continue;
      const audible=overdub?true:(hasSolo?track.soloed:!track.muted);
      // Apply trim to each block before concat
      const trimmedBufs=[];
      for(const b of track.blocks){
        if(!b.audioBuffer)continue;
        const ts=b.trimStart||0, te=b.trimEnd||b.audioBuffer.duration;
        if(ts>0||te<b.audioBuffer.duration-0.01){
          try{const tb=await trimAudioBuffer(b.audioBuffer,ts,te,ctx.sampleRate);trimmedBufs.push(tb);}
          catch{trimmedBufs.push(b.audioBuffer);}
        } else {
          trimmedBufs.push(b.audioBuffer);
        }
      }
      const bufs=trimmedBufs.filter(Boolean);
      if(!bufs.length)continue;
      let buf; try{buf=await concatBuffers(bufs,ctx.sampleRate);}catch{continue;}
      if(!buf)continue;
      if(buf.duration>maxDur)maxDur=buf.duration;
      const chain=buildFxChain(ctx,track.fx||defaultFx());
      const gain=ctx.createGain(); gain.gain.value=audible?1:0;
      chain.output.connect(gain); gain.connect(ctx.destination);
      const src=ctx.createBufferSource(); src.buffer=buf; src.loop=loop;
      src.connect(chain.input); src.start(startAt); nodes.push(src);
    }
    for(const track of iTracks){
      if(!track.audioBuffer)continue;
      const audible=overdub?true:(hasSolo?track.soloed:!track.muted);
      if(track.audioBuffer.duration>maxDur)maxDur=track.audioBuffer.duration;
      const chain=buildFxChain(ctx,track.fx||defaultFx());
      const gain=ctx.createGain(); gain.gain.value=audible?1:0;
      chain.output.connect(gain); gain.connect(ctx.destination);
      const src=ctx.createBufferSource(); src.buffer=track.audioBuffer; src.loop=loop;
      src.connect(chain.input); src.start(startAt); nodes.push(src);
    }
    playbackNodesRef.current=nodes;
    const has=nodes.length>0; setIsPlaying(has);
    if(has){
      startPlayhead(startAt,maxDur);
      if(!loop)setTimeout(()=>{setIsPlaying(false);setIsLooping(false);stopPlayhead();playbackNodesRef.current=[];},(maxDur+0.15)*1000);
    }
  }

  function handlePlayAll(){
    if(isPlayingRef.current||isLoopingRef.current){stopAllPlayback();return;}
    isPlayingRef.current=true;
    playAllImpl(recTracks,impTracks,false,false);
  }
  function handleLoopAll(){
    // Use refs for synchronous guard — prevents double-trigger on fast taps
    if(isLoopingRef.current||isPlayingRef.current){stopAllPlayback();return;}
    isLoopingRef.current=true; // set immediately before async playAllImpl
    playAllImpl(recTracks,impTracks,false,true);
    setIsLooping(true);
  }
  function handleStopAll(){
    if(previewing){clearTimeout(previewTimerRef.current);setPreviewing(false);setBeat(0);setBeatOn(false);}
    if(countingIn){countInTimers.current.forEach(clearTimeout);setCountingIn(false);setBeat(0);setBeatOn(false);return;}
    stopAllPlayback();
    const rec=recTracks.find(t=>t.recording); if(rec)handleStop(rec.id);
  }

  // ── Track management ────────────────────────────────────────────
  const mutRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,muted:!t.muted}:t));
  const solRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,soloed:!t.soloed}:t));
  const delRec=id=>setRecTracks(p=>p.filter(t=>t.id!==id));
  const delBlock=(tid,bid)=>setRecTracks(p=>p.map(t=>t.id===tid?{...t,blocks:t.blocks.filter(b=>b.id!==bid)}:t));
  const splitBlock=async(tid,bid,splitSec)=>{
    const ctx=getCtx();
    const track=recTracksRef.current.find(t=>t.id===tid);
    if(!track)return;
    const block=track.blocks.find(b=>b.id===bid);
    if(!block||!block.audioBuffer)return;
    const [leftBuf,rightBuf]=await splitAudioBuffer(block.audioBuffer,splitSec,ctx.sampleRate);
    if(!leftBuf||!rightBuf)return;
    const barDurSec=(60/bpmRef.current)*BEATS_PER_BAR;
    const leftBars=leftBuf.duration/barDurSec;
    const leftBlock={id:uid(),startBar:block.startBar,bars:Math.max(1,Math.round(leftBars)),
      audioBuffer:leftBuf,rawBlob:null,durationSec:leftBuf.duration,
      trimStart:0,trimEnd:leftBuf.duration};
    const rightBlock={id:uid(),startBar:block.startBar+leftBlock.bars,bars:Math.max(1,block.bars-leftBlock.bars),
      audioBuffer:rightBuf,rawBlob:null,durationSec:rightBuf.duration,
      trimStart:0,trimEnd:rightBuf.duration};
    setRecTracks(p=>p.map(t=>{
      if(t.id!==tid)return t;
      const idx=t.blocks.findIndex(b=>b.id===bid);
      const newBlocks=[...t.blocks.slice(0,idx),leftBlock,rightBlock,...t.blocks.slice(idx+1)];
      return{...t,blocks:newBlocks};
    }));
    setSplitMode(null);
  };

  const trimBlock=(tid,bid,side,deltaSec)=>setRecTracks(p=>p.map(t=>{
    if(t.id!==tid)return t;
    return {...t,blocks:t.blocks.map(b=>{
      if(b.id!==bid)return b;
      const dur=b.audioBuffer?b.audioBuffer.duration:b.durationSec;
      if(side==='start'){
        const newStart=Math.max(0,Math.min((b.trimEnd||dur)-0.1,(b.trimStart||0)+deltaSec));
        return {...b,trimStart:newStart};
      } else {
        const newEnd=Math.max((b.trimStart||0)+0.1,Math.min(dur,(b.trimEnd||dur)+deltaSec));
        return {...b,trimEnd:newEnd};
      }
    })};
  }));
  const toggleSelfMonitor=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,selfMonitor:!t.selfMonitor}:t));
  const toggleFxRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,fxOpen:!t.fxOpen}:t));
  const changeFxRec=(id,fx)=>{
    setRecTracks(p=>p.map(t=>t.id===id?{...t,fx}:t));
    const track=recTracksRef.current.find(t=>t.id===id);
    if(track?.recording&&micStreamRef.current) startMonitor(micStreamRef.current,fx);
  };
  const mutImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,muted:!t.muted}:t));
  const solImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,soloed:!t.soloed}:t));
  const delImp=id=>setImpTracks(p=>p.filter(t=>t.id!==id));
  const clrImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,audioBuffer:null,filename:''}:t));
  const toggleFxImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,fxOpen:!t.fxOpen}:t));
  const changeFxImp=(id,fx)=>setImpTracks(p=>p.map(t=>t.id===id?{...t,fx}:t));
  const addRecTrack=()=>{if(recTracks.length<MAX_REC_TRACKS)setRecTracks(p=>[...p,makeRecTrack(p.length+1)]);};
  const addImpTrack=()=>{if(impTracks.length<MAX_IMP_TRACKS)setImpTracks(p=>[...p,makeImpTrack(p.length+1)]);};

  async function handleFileLoad(trackId,file){
    try{
      const buf=await getCtx().decodeAudioData(await file.arrayBuffer());
      setImpTracks(p=>p.map(t=>t.id===trackId?{...t,audioBuffer:buf,filename:file.name.replace(/\.[^.]+$/,'').slice(0,18)}:t));
    }catch{alert('音声ファイルのデコードに失敗しました。');}
  }

  const hasAny=[...recTracks.filter(t=>t.blocks.length>0),...impTracks.filter(t=>t.audioBuffer)].length>0;
  const totalBeatsDuringRec=bars*BEATS_PER_BAR;
  const maxDurSec=Math.max(...recTracks.map(t=>t.blocks.reduce((s,b)=>s+b.durationSec,0)),...impTracks.map(t=>t.audioBuffer?.duration||0),0.1);

  return(
    <div style={{minHeight:'100vh',background:'#090c16',
      backgroundImage:'radial-gradient(ellipse at 15% 15%,rgba(25,40,110,0.4) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(120,90,30,0.18) 0%,transparent 50%)',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'28px 12px 60px',
      fontFamily:"'Space Mono',monospace",color:'#e2e8f0'}}>

      {/* Header */}
      <div style={{textAlign:'center',marginBottom:24,display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        <div style={{width:80,height:80,borderRadius:20,overflow:'hidden',
          boxShadow:'0 0 0 1px rgba(180,150,80,0.28),0 4px 28px rgba(0,0,0,0.7),0 0 40px rgba(180,150,80,0.12)'}}>
          <img src={APP_ICON} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:'clamp(18px,5vw,34px)',fontWeight:800,letterSpacing:'-0.02em',
            background:'linear-gradient(135deg,#c8a96e 0%,#e8d5a0 50%,#b8935a 100%)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}>Harmony Layer Recorder</div>
          <div style={{fontSize:9,color:'#5c4a2a',letterSpacing:'0.16em'}}>MULTI-TRACK VOCAL OVERDUB · v7</div>
        </div>
      </div>

      {permDenied&&(
        <div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.24)',borderRadius:10,
          padding:'8px 14px',fontSize:11,color:'#f87171',marginBottom:16,maxWidth:500,textAlign:'center'}}>
          ⚠ マイクへのアクセスが拒否されました。ブラウザの設定で許可してください。
        </div>
      )}

      <TransportBar bpm={bpm} onBpm={setBpm} bars={bars} onBars={setBars} disabled={anyActive}
        onTap={handleTap} tapActive={tapActive} onPreview={handlePreview} previewing={previewing}
        defaultBars={defaultBars}
        onSaveDefaultBars={()=>{
          try{localStorage.setItem('hlr_defaultBars',bars);}catch{}
          setDefaultBars(bars);
        }}/>
      {/* Mic sensitivity control */}
      <div style={{display:'flex',alignItems:'center',gap:10,
        background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',
        borderRadius:10,padding:'7px 14px',marginBottom:12,width:'100%',maxWidth:760}}>
        <span style={{fontSize:10,color:'#64748b',letterSpacing:'0.08em',minWidth:52}}>🎤 感度</span>
        <input type='range' min={0.1} max={3.0} step={0.05} value={micGain}
          onChange={e=>{const v=Number(e.target.value);setMicGain(v);micGainRef.current=v;if(micGainNodeRef.current)micGainNodeRef.current.gain.value=v;}}
          style={{flex:1,accentColor:GOLD}}/>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,
          color:micGain>2?RED:micGain>1.5?'#facc15':GOLD,minWidth:36,textAlign:'right'}}>
          {micGain>=2?'HIGH':micGain<=0.5?'LOW':Math.round(micGain*100)+'%'}
        </span>
        {micGain>2&&<span style={{fontSize:9,color:RED,fontFamily:'monospace'}}>⚠ 歪み注意</span>}
      </div>
      <BeatDisplay beat={beat} beatOn={beatOn} countingIn={countingIn} isRecording={isRecording}
        bpm={bpm} barCount={bars} beatsDone={beatsDone} totalBeats={totalBeatsDuringRec}/>

      <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
        <GBtn onClick={handlePlayAll} color={isPlaying?'#facc15':GREEN} glow={isPlaying?'rgba(250,204,21,0.25)':'rgba(74,222,128,0.22)'} disabled={!hasAny||anyActive} active={isPlaying}>
          {isPlaying?'⏸ PAUSE':'▶ PLAY ALL'}
        </GBtn>
        <GBtn onClick={handleLoopAll} color={GOLD} glow='rgba(200,169,110,0.28)' disabled={!hasAny||anyActive} active={isLooping}>
          {isLooping?'↺ ループ中':'↺ LOOP ALL'}
        </GBtn>
        <GBtn onClick={handleStopAll} color={isLooping?RED:'#94a3b8'} glow={isLooping?'rgba(239,68,68,0.35)':'rgba(148,163,184,0.08)'} disabled={!isPlaying&&!isLooping&&!anyActive} active={isLooping}>{isLooping?'⏹ ループ停止':'⏹ STOP'}</GBtn>
      </div>

      <div style={{width:'100%',maxWidth:760}}>
        <div style={{display:'flex',marginBottom:2}}>
          <div style={{width:110,flexShrink:0,fontSize:9,color:'#6b7280',fontFamily:'monospace',letterSpacing:'0.1em',paddingLeft:4,display:'flex',alignItems:'center'}}>🎤 録音トラック</div>
          <div style={{overflowX:'hidden',flex:1}}><TimelineRuler totalBars={totalBars} cellW={cellW}/></div>
        </div>
        <div style={{overflowX:'auto'}}>
          {recTracks.map(track=>(
            <div key={track.id} style={{minWidth:110+totalBars*cellW}}>
              <RecTrackRow track={track} totalBars={totalBars} cellW={cellW} bpm={bpm} bars={bars}
                anyRecording={isRecording} countingIn={countingIn}
                onRecord={()=>handleRecord(track.id)} onStop={()=>handleStop(track.id)}
                onMute={()=>mutRec(track.id)} onSolo={()=>solRec(track.id)} onDelete={()=>delRec(track.id)}
                onDeleteBlock={bid=>delBlock(track.id,bid)}
                onTrimBlock={(bid,side,delta)=>trimBlock(track.id,bid,side,delta)}
                onSplitBlock={(bid,sec)=>splitBlock(track.id,bid,sec)}
                splitMode={splitMode}
                onSetSplitMode={setSplitMode}
                onDownload={(buf,blob,name)=>setDownloadTarget({audioBuffer:buf,rawBlob:blob,filename:name})}
                onToggleSelfMonitor={()=>toggleSelfMonitor(track.id)}
                onToggleFx={()=>toggleFxRec(track.id)}
                onChangeFx={fx=>changeFxRec(track.id,fx)}
                micStream={micStream} playTimeSec={playPos}/>
            </div>
          ))}
        </div>
        {recTracks.length<MAX_REC_TRACKS&&<AddBtn onClick={addRecTrack} label='＋ 録音トラックを追加'/>}

        <div style={{marginTop:16,marginBottom:2,fontSize:9,color:'#6b7280',fontFamily:'monospace',letterSpacing:'0.1em',paddingLeft:4}}>♪ インポートトラック</div>
        {impTracks.map(track=>(
          <ImpTrackRow key={track.id} track={track} totalBars={totalBars} cellW={cellW}
            onFileLoad={f=>handleFileLoad(track.id,f)}
            onMute={()=>mutImp(track.id)} onSolo={()=>solImp(track.id)}
            onDelete={()=>delImp(track.id)} onClear={()=>clrImp(track.id)}
            onToggleFx={()=>toggleFxImp(track.id)}
            onChangeFx={fx=>changeFxImp(track.id,fx)}
            onDownload={(buf,blob,name)=>setDownloadTarget({audioBuffer:buf,rawBlob:blob,filename:name})}
            playTimeSec={playPos}/>
        ))}
        {impTracks.length<MAX_IMP_TRACKS&&<AddBtn onClick={addImpTrack} label='＋ インポートトラックを追加'/>}
      </div>

      <WavePanel recTracks={recTracks} impTracks={impTracks} playPos={playPos} isLooping={isLooping} maxDur={maxDurSec}/>

      <div style={{marginTop:24,fontSize:9,color:'#64748b',letterSpacing:'0.08em',textAlign:'center',lineHeight:2}}>
        ⏺ 録音 ｜ ■ 停止 ｜ FX エフェクト ｜ M ミュート ｜ S ソロ ｜ ↑ ファイル読込 ｜ ↺ ループ
      </div>
      {/* Storage meter */}
      <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10,
        background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.05)',
        borderRadius:8,padding:'6px 14px',width:'100%',maxWidth:760}}>
        <span style={{fontSize:10,color:'#475569',fontFamily:'monospace',letterSpacing:'0.06em'}}>💾 メモリ使用量</span>
        <div style={{flex:1,height:4,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}}>
          <div style={{
            height:'100%',borderRadius:2,transition:'width 0.5s',
            background: parseFloat(estimateMemoryMB(recTracks,impTracks))>100?RED:parseFloat(estimateMemoryMB(recTracks,impTracks))>50?'#facc15':GOLD,
            width:`${Math.min(100,(parseFloat(estimateMemoryMB(recTracks,impTracks))/200)*100)}%`,
          }}/>
        </div>
        <span style={{fontSize:10,fontFamily:'monospace',fontWeight:700,
          color:parseFloat(estimateMemoryMB(recTracks,impTracks))>100?RED:GOLD,minWidth:52,textAlign:'right'}}>
          {estimateMemoryMB(recTracks,impTracks)} MB
        </span>
      </div>
      {/* Download Modal */}
      {downloadTarget&&<DownloadModal
        audioBuffer={downloadTarget.audioBuffer}
        rawBlob={downloadTarget.rawBlob}
        filename={downloadTarget.filename}
        onClose={()=>setDownloadTarget(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
