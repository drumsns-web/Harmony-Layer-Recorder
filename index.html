const defaultFx = () => ({ preset:'none', wet:0.5 });

function makeRecTrack(n){
  return {id:uid(),kind:'rec',name:`Track ${n}`,blocks:[],recording:false,
    muted:false,soloed:false,selfMonitor:false,fx:defaultFx(),fxOpen:false};
}
function makeImpTrack(n){
  return {id:uid(),kind:'imp',name:`Import ${n}`,audioBuffer:null,filename:'',
    muted:false,soloed:false,fx:defaultFx(),fxOpen:false};
}

// ── FX Engine (outside App — pure functions) ────────────────────
function makeImpulse(ctx, dur, decay, reverse){
  const sr=ctx.sampleRate, len=Math.floor(sr*dur);
  const buf=ctx.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){
      const n=reverse?len-i:i;
      d[i]=(Math.random()*2-1)*Math.pow(1-n/len,decay);
    }
  }
  return buf;
}

function buildFxChain(ctx, fx){
  const preset=fx?.preset||'none', wet=fx?.wet??0.5;
  if(preset==='none'){const g=ctx.createGain();g.gain.value=1;return{input:g,output:g};}

  const splitter=ctx.createGain(); splitter.gain.value=1;
  const dryG=ctx.createGain(); dryG.gain.value=1-wet;
  const wetG=ctx.createGain(); wetG.gain.value=wet;
  const merger=ctx.createGain(); merger.gain.value=1;
  splitter.connect(dryG); dryG.connect(merger);

  let fxIn, fxOut;

  if(preset==='reverb'){
    const c=ctx.createConvolver(); c.buffer=makeImpulse(ctx,2.5,2,false);
    fxIn=c; fxOut=c;
  } else if(preset==='gateReverb'){
    const c=ctx.createConvolver(); c.buffer=makeImpulse(ctx,0.8,0.5,true);
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-30; comp.ratio.value=20; comp.attack.value=0.001; comp.release.value=0.1;
    c.connect(comp); fxIn=c; fxOut=comp;
  } else if(preset==='delay'){
    const d=ctx.createDelay(2.0); d.delayTime.value=0.375;
    const fb=ctx.createGain(); fb.gain.value=0.45;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=4000;
    d.connect(lpf); lpf.connect(fb); fb.connect(d);
    fxIn=d; fxOut=d;
  } else if(preset==='flanger'){
    const d=ctx.createDelay(0.02); d.delayTime.value=0.005;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=0.4; lg.gain.value=0.003;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    const fb=ctx.createGain(); fb.gain.value=0.7; d.connect(fb); fb.connect(d);
    fxIn=d; fxOut=d;
  } else if(preset==='chorus'){
    const d=ctx.createDelay(0.05); d.delayTime.value=0.025;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=1.2; lg.gain.value=0.008;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    fxIn=d; fxOut=d;
  } else if(preset==='distortion'){
    const w=ctx.createWaveShaper(); const k=200;
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=((Math.PI+k)*x)/(Math.PI+k*Math.abs(x));}
    w.curve=curve; w.oversample='4x';
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=3500;
    w.connect(lpf); fxIn=w; fxOut=lpf;
  } else if(preset==='lofi'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2200;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=300;
    const crush=ctx.createWaveShaper();
    const steps=Math.pow(2,6); const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.round(x*steps)/steps;}
    crush.curve=curve; lpf.connect(hpf); hpf.connect(crush); fxIn=lpf; fxOut=crush;
  } else if(preset==='telephone'){
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=700;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=3000;
    const pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=1800; pk.gain.value=8; pk.Q.value=1.5;
    hpf.connect(lpf); lpf.connect(pk); fxIn=hpf; fxOut=pk;
  } else if(preset==='tape'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=6000;
    const sat=ctx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.tanh(x*2)*0.8;}
    sat.curve=curve;
    const flutter=ctx.createOscillator(); const fg=ctx.createGain();
    flutter.frequency.value=4.5; fg.gain.value=0.04; flutter.connect(fg);
    const mg=ctx.createGain(); mg.gain.value=1; fg.connect(mg.gain); flutter.start();
    lpf.connect(sat); sat.connect(mg); fxIn=lpf; fxOut=mg;
  } else if(preset==='robot'){
    const osc=ctx.createOscillator(); osc.frequency.value=80; osc.type='sawtooth';
    const rg=ctx.createGain(); rg.gain.value=0; osc.connect(rg.gain); osc.start();
    const dist=ctx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=(i*2)/255-1;curve[i]=Math.sign(x)*(1-Math.exp(-Math.abs(x)*5));}
    dist.curve=curve;
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2000;
    rg.connect(dist); dist.connect(lpf); fxIn=rg; fxOut=lpf;
  } else if(preset==='helium'){
    const d=ctx.createDelay(0.1); d.delayTime.value=0.01;
    const lfo=ctx.createOscillator(); const lg=ctx.createGain();
    lfo.frequency.value=8; lg.gain.value=0.006;
    lfo.connect(lg); lg.connect(d.delayTime); lfo.start();
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=200;
    d.connect(hpf); fxIn=d; fxOut=hpf;
  } else if(preset==='deep'){
    const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=800;
    const sub=ctx.createBiquadFilter(); sub.type='peaking'; sub.frequency.value=120; sub.gain.value=12; sub.Q.value=2;
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=60;
    lpf.connect(sub); sub.connect(hpf); fxIn=lpf; fxOut=hpf;
  } else {
    const g=ctx.createGain(); return{input:g,output:g};
  }

  splitter.connect(fxIn);
  fxOut.connect(wetG); wetG.connect(merger);
  return {input:splitter, output:merger};
}

// ── Click sound ─────────────────────────────────────────────────
function playClick(ctx, isBeat1, time){
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value=isBeat1?1100:750; o.type='sine';
  g.gain.setValueAtTime(0.3,time);
  g.gain.exponentialRampToValueAtTime(0.001,time+0.055);
  o.start(time); o.stop(time+0.07);
}

// ── Concat AudioBuffers ─────────────────────────────────────────
async function concatBuffers(bufs, sr){
  if(!bufs.length) return null;
  if(bufs.length===1) return bufs[0];
  const total=bufs.reduce((s,b)=>s+b.length,0);
  const ch=bufs[0].numberOfChannels;
  const off=new OfflineAudioContext(ch,total,sr);
  let offset=0;
  for(const b of bufs){
    const src=off.createBufferSource(); src.buffer=b; src.connect(off.destination);
    src.start(off.currentTime+offset/sr); offset+=b.length;
  }
  return await off.startRendering();
}

// ── Waveform ────────────────────────────────────────────────────
function drawWave(audioBuffer, canvas, color, playPos){
  if(!canvas||!audioBuffer) return;
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const data=audioBuffer.getChannelData(0), step=Math.max(1,Math.floor(data.length/W)), mid=H/2;
  ctx.fillStyle=color+'77';
  for(let x=0;x<W;x++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=data[x*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    ctx.fillRect(x,mid+mx*mid*0.9,1,Math.max(1,(mid+mn*mid*0.9)-(mid+mx*mid*0.9)));
  }
  if(playPos!=null){
    const px=Math.floor(playPos*W);
    ctx.strokeStyle='#f87171'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
  }
}
function MiniWave({audioBuffer,color}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    ref.current.width=ref.current.offsetWidth||120;
    drawWave(audioBuffer,ref.current,color,null);
  },[audioBuffer,color]);
  return <canvas ref={ref} height={36} style={{width:'100%',height:36,display:'block'}}/>;
}
function WaveCanvas({audioBuffer,playTimeSec,color,height=52,label}){
  const ref=useRef(null), last=useRef(-1);
  const pos=(playTimeSec!=null&&audioBuffer)
    ?Math.min(1,Math.max(0,(playTimeSec%audioBuffer.duration)/audioBuffer.duration)):null;
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    ref.current.width=ref.current.offsetWidth||700;
    drawWave(audioBuffer,ref.current,color,null);
  },[audioBuffer,color]);
  useEffect(()=>{
    if(!ref.current||!audioBuffer)return;
    if(pos==null){drawWave(audioBuffer,ref.current,color,null);last.current=-1;return;}
    if(Math.abs(pos-last.current)<0.002)return;
    last.current=pos; ref.current.width=ref.current.offsetWidth||700;
    drawWave(audioBuffer,ref.current,color,pos);
  },[pos,audioBuffer,color]);
  return(
    <div style={{position:'relative',width:'100%'}}>
      {label&&<div style={{position:'absolute',left:8,top:4,fontSize:10,fontFamily:'monospace',color:'#475569',zIndex:1,pointerEvents:'none'}}>{label}</div>}
      <canvas ref={ref} height={height} style={{width:'100%',height,display:'block',borderRadius:6}}/>
    </div>
  );
}

// ── Level meter ─────────────────────────────────────────────────
function useLevelMeter(stream){
  const [lv,setLv]=useState(0); const raf=useRef(null);
  useEffect(()=>{
    if(!stream){setLv(0);return;}
    const ctx=new AudioContext(),src=ctx.createMediaStreamSource(stream),an=ctx.createAnalyser();
    an.fftSize=256; src.connect(an);
    const d=new Uint8Array(an.frequencyBinCount);
    const tick=()=>{an.getByteTimeDomainData(d);let s=0;for(let i=0;i<d.length;i++)s+=Math.abs(d[i]-128);setLv(Math.min(1,(s/d.length)/32));raf.current=requestAnimationFrame(tick);};
    tick(); return()=>{cancelAnimationFrame(raf.current);ctx.close();};
  },[stream]); return lv;
}
function LevelMeter({level}){
  return(
    <div style={{display:'flex',gap:2,height:12,alignItems:'center'}}>
      {Array.from({length:10}).map((_,i)=>(
        <div key={i} style={{width:4,height:'100%',borderRadius:1,
          background:level>i/10?(i<7?'#4ade80':i<9?'#facc15':'#f87171'):'rgba(255,255,255,0.06)',
          transition:'background 0.04s'}}/>
      ))}
    </div>
  );
}

      {/* Timeline */}
      <div style={{width:totalBars*cellW,flexShrink:0,position:'relative',background:'rgba(0,0,0,0.25)',
        border:'1px solid rgba(255,255,255,0.06)',borderRadius:'0 10px 10px 0',overflow:'hidden',minHeight:72}}>
        <div style={{position:'absolute',inset:0,display:'flex',pointerEvents:'none',width:totalBars*cellW}}>
          {Array.from({length:totalBars}).map((_,i)=>(
            <div key={i} style={{width:cellW,flexShrink:0,borderLeft:i===0?'none':'1px solid rgba(255,255,255,0.04)',height:'100%'}}/>
          ))}
        </div>
        {track.blocks.map(block=>{
          const left=(block.startBar-1)*cellW;
          const barDurSec=(60/bpm)*BEATS_PER_BAR;
          const actualBars=block.audioBuffer?block.audioBuffer.duration/barDurSec:block.bars;
          const width=actualBars*cellW;
          return(
            <div key={block.id} style={{position:'absolute',top:4,left,width,height:'calc(100% - 8px)',
              background:'rgba(200,169,110,0.15)',border:'1px solid rgba(200,169,110,0.35)',
              borderRadius:6,overflow:'hidden'}}>
              <MiniWave audioBuffer={block.audioBuffer} color={GOLD}/>
              <div style={{position:'absolute',bottom:2,left:4,right:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:9,fontFamily:'monospace',color:GOLD,opacity:0.8}}>{block.bars}小節</span>
                <button onClick={()=>onDeleteBlock(block.id)} style={{background:'rgba(239,68,68,0.2)',
                  border:'1px solid rgba(239,68,68,0.3)',borderRadius:3,color:'#f87171',fontSize:9,padding:'0 4px',cursor:'pointer',lineHeight:'14px'}}>✕</button>
              </div>
            </div>
          );
        })}
        {isRec&&(()=>{
          const nextBar=track.blocks.reduce((m,b)=>Math.max(m,b.startBar+b.bars),1);
          return(
            <div style={{position:'absolute',top:4,left:(nextBar-1)*cellW,width:bars*cellW,height:'calc(100% - 8px)',
              background:'rgba(239,68,68,0.08)',border:'1px dashed rgba(239,68,68,0.5)',
              borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:10,color:RED,fontFamily:'monospace',animation:'recDot 0.75s ease-in-out infinite'}}>● REC</span>
            </div>
          );
        })()}
        {playTimeSec!=null&&(
          <div style={{position:'absolute',top:0,bottom:0,width:1.5,background:'#f87171',opacity:0.8,
            left:(playTimeSec/((60/bpm)*BEATS_PER_BAR))*cellW,pointerEvents:'none'}}/>
        )}
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function App(){
  const [recTracks,setRecTracks]=useState(()=>[makeRecTrack(1),makeRecTrack(2),makeRecTrack(3)]);
  const [impTracks,setImpTracks]=useState(()=>[makeImpTrack(1)]);
  const [bpm,setBpm]=useState(DEFAULT_BPM);
  const [bars,setBars]=useState(4);
  const [isPlaying,setIsPlaying]=useState(false);
  const [isLooping,setIsLooping]=useState(false);
  const [permDenied,setPermDenied]=useState(false);
  const [micStream,setMicStream]=useState(null);
  const [countingIn,setCountingIn]=useState(false);
  const [beat,setBeat]=useState(0);
  const [beatOn,setBeatOn]=useState(false);
  const [beatsDone,setBeatsDone]=useState(0);
  const [playPos,setPlayPos]=useState(null);
  const [micGain,setMicGain]=useState(1.0); // 0.1 ~ 3.0
  const micGainRef=useRef(1.0);
  const isPlayingRef=useRef(false);   // sync ref to prevent double-trigger
  const isLoopingRef=useRef(false);   // sync ref to prevent double-trigger
  const micGainNodeRef=useRef(null); // GainNode on mic stream
  const [tapTimes,setTapTimes]=useState([]);
  const [tapActive,setTapActive]=useState(false);
  const [previewing,setPreviewing]=useState(false);

  const audioCtxRef=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const recTrackIdRef=useRef(null);
  const playbackNodesRef=useRef([]);
  const recTimerRef=useRef(null);
  const countInTimers=useRef([]);
  const beatMetroTimers=useRef([]);
  const playheadRaf=useRef(null);
  const playStartRef=useRef(null);
  const monitorSrcRef=useRef(null);
  const monitorGainRef=useRef(null);
  const previewTimerRef=useRef(null);
  const tapTimerRef=useRef(null);
  const micStreamRef=useRef(null);

  const recTracksRef=useRef(recTracks);
  const impTracksRef=useRef(impTracks);
  const barsRef=useRef(bars);
  const bpmRef=useRef(bpm);
  useEffect(()=>{recTracksRef.current=recTracks;},[recTracks]);
  useEffect(()=>{impTracksRef.current=impTracks;},[impTracks]);
  useEffect(()=>{barsRef.current=bars;},[bars]);
  useEffect(()=>{bpmRef.current=bpm;},[bpm]);
  useEffect(()=>{isPlayingRef.current=isPlaying;},[isPlaying]);
  useEffect(()=>{isLoopingRef.current=isLooping;},[isLooping]);
  useEffect(()=>{
    micGainRef.current=micGain;
    if(micGainNodeRef.current) micGainNodeRef.current.gain.value=micGain;
  },[micGain]);
  useEffect(()=>{micStreamRef.current=micStream;},[micStream]);

  const isRecording=recTracks.some(t=>t.recording);
  const anyActive=isRecording||countingIn;
  const maxBlockEnd=recTracks.reduce((m,t)=>Math.max(m,...t.blocks.map(b=>b.startBar+b.bars-1)),0);
  const totalBars=Math.max(16,maxBlockEnd+bars+4);
  const cellW=48;

  function getCtx(){
    if(!audioCtxRef.current||audioCtxRef.current.state==='closed')
      audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtxRef.current.state==='suspended')audioCtxRef.current.resume();
    return audioCtxRef.current;
  }
  async function getMic(){
    // Always request fresh stream so iOS mic indicator stays accurate
    if(micStreamRef.current){
      micStreamRef.current.getTracks().forEach(t=>t.stop());
      setMicStream(null);
    }
    try{
      const rawStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      // Apply input gain node for sensitivity control
      const ctx=getCtx();
      const src=ctx.createMediaStreamSource(rawStream);
      const gainNode=ctx.createGain();
      gainNode.gain.value=micGainRef.current;
      micGainNodeRef.current=gainNode;
      const dest=ctx.createMediaStreamDestination();
      src.connect(gainNode); gainNode.connect(dest);
      const processedStream=dest.stream;
      setMicStream(processedStream);
      return processedStream;
    }
    catch{setPermDenied(true);return null;}
  }

  function releaseMic(){
    if(micStreamRef.current){
      micStreamRef.current.getTracks().forEach(t=>t.stop());
      setMicStream(null);
    }
  }

  // ── Monitor (mic → FX → speaker, live during recording) ───────
  function stopMonitor(){
    try{monitorSrcRef.current?.disconnect();}catch{}
    try{monitorGainRef.current?.disconnect();}catch{}
    monitorSrcRef.current=null; monitorGainRef.current=null;
  }
  function startMonitor(stream,fx){
    stopMonitor();
    if(!fx||fx.preset==='none')return;
    const ctx=getCtx();
    const src=ctx.createMediaStreamSource(stream);
    const chain=buildFxChain(ctx,fx);
    const gain=ctx.createGain(); gain.gain.value=0.85;
    chain.output.connect(gain); gain.connect(ctx.destination);
    src.connect(chain.input);
    monitorSrcRef.current=src; monitorGainRef.current=gain;
  }

  // ── Playhead ────────────────────────────────────────────────────
  function startPlayhead(startT,dur){
    playStartRef.current=startT;
    const tick=()=>{
      const ctx=audioCtxRef.current; if(!ctx)return;
      const el=ctx.currentTime-startT;
      setPlayPos(Math.max(0,dur>0?el%dur:el));
      playheadRaf.current=requestAnimationFrame(tick);
    };
    playheadRaf.current=requestAnimationFrame(tick);
  }
  function stopPlayhead(){cancelAnimationFrame(playheadRaf.current);setPlayPos(null);}

  // ── Stop all ────────────────────────────────────────────────────
  function stopAllPlayback(){
    playbackNodesRef.current.forEach(s=>{try{s.stop();}catch{}});
    playbackNodesRef.current=[];
    isPlayingRef.current=false;   // reset synchronously
    isLoopingRef.current=false;
    setIsPlaying(false);setIsLooping(false);
    stopPlayhead(); stopMonitor();
  }

  // ── Tap tempo ───────────────────────────────────────────────────
  function handleTap(){
    const now=performance.now();
    setTapTimes(prev=>{
      const recent=[...prev,now].filter(t=>now-t<3000);
      if(recent.length>=2){
        let total=0;
        for(let i=1;i<recent.length;i++)total+=recent[i]-recent[i-1];
        const nb=Math.round(60000/(total/(recent.length-1)));
        if(nb>=40&&nb<=200)setBpm(nb);
      }
      setTapActive(true);
      clearTimeout(tapTimerRef.current);
      tapTimerRef.current=setTimeout(()=>setTapActive(false),280);
      return recent;
    });
  }

  // ── Preview metronome ───────────────────────────────────────────
  function handlePreview(){
    if(previewing){
      clearTimeout(previewTimerRef.current);
      setPreviewing(false); setBeat(0); setBeatOn(false); return;
    }
    const ctx=getCtx(); setPreviewing(true);
    let count=0;
    const tick=()=>{
      const b=(count%BEATS_PER_BAR)+1;
      playClick(ctx,b===1,ctx.currentTime);
      setBeat(b); setBeatOn(true); count++;
      const bpmNow=bpmRef.current, beatMs=60000/bpmNow, flashMs=Math.min(beatMs*0.35,145);
      setTimeout(()=>setBeatOn(false),flashMs);
      previewTimerRef.current=setTimeout(tick,beatMs);
    };
    tick();
  }

  // ── Count-in scheduling ─────────────────────────────────────────
  function scheduleCountIn(onDone){
    const ctx=getCtx(), beatSec=60/bpmRef.current, t0=ctx.currentTime+0.08;
    countInTimers.current.forEach(clearTimeout); countInTimers.current=[];
    for(let i=0;i<COUNT_IN_BEATS;i++){
      const beatT=t0+i*beatSec;
      playClick(ctx,i===0,beatT);
      const onMs=(beatT-ctx.currentTime)*1000, flashMs=Math.min(beatSec*1000*0.35,145);
      countInTimers.current.push(
        setTimeout(()=>{setBeat(i+1);setBeatOn(true);},onMs),
        setTimeout(()=>setBeatOn(false),onMs+flashMs)
      );
    }
    const recMs=(t0+COUNT_IN_BEATS*beatSec-ctx.currentTime)*1000;
    countInTimers.current.push(setTimeout(()=>{
      setCountingIn(false);setBeat(0);setBeatOn(false);
      onDone(t0+COUNT_IN_BEATS*beatSec);
    },recMs));
  }

  function scheduleBeatMetro(startAudioT,totalBeats){
    const ctx=getCtx(), beatSec=60/bpmRef.current, flashMs=Math.min(beatSec*1000*0.35,145);
    beatMetroTimers.current.forEach(clearTimeout); beatMetroTimers.current=[];
    for(let i=0;i<totalBeats;i++){
      const beatT=startAudioT+i*beatSec, onMs=(beatT-ctx.currentTime)*1000;
      if(onMs<0)continue;
      beatMetroTimers.current.push(
        setTimeout(()=>{setBeat((i%BEATS_PER_BAR)+1);setBeatOn(true);setBeatsDone(i+1);},onMs),
        setTimeout(()=>setBeatOn(false),onMs+flashMs)
      );
    }
    const endMs=(startAudioT+totalBeats*beatSec-ctx.currentTime)*1000+100;
    beatMetroTimers.current.push(setTimeout(()=>{setBeat(0);setBeatOn(false);setBeatsDone(0);},endMs));
  }

  // ── Recording ───────────────────────────────────────────────────
  function startActualRecording(trackId,stream,audioStartT){
    const barsNow=barsRef.current, bpmNow=bpmRef.current;
    const durSec=(barsNow*BEATS_PER_BAR*60)/bpmNow;
    // Set recTrackIdRef BEFORE playAllImpl so overdub skip works correctly
    recTrackIdRef.current=trackId;
    playAllImpl(recTracksRef.current,impTracksRef.current,true);
    scheduleBeatMetro(audioStartT,barsNow*BEATS_PER_BAR);

    // Start live FX monitor if preset active
    const recTrack=recTracksRef.current.find(t=>t.id===trackId);
    if(recTrack?.fx?.preset!=='none') startMonitor(stream,recTrack.fx);

    chunksRef.current=[];
    const mr=new MediaRecorder(stream); mrRef.current=mr;
    mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
    mr.start(100);
    setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:true}:t));
    setBeatsDone(0);
    recTimerRef.current=setTimeout(()=>finalizeRec(trackId,barsNow),durSec*1000+80);
  }

  function finalizeRec(trackId,barsUsed){
    clearTimeout(recTimerRef.current);
    beatMetroTimers.current.forEach(clearTimeout);
    stopMonitor(); stopAllPlayback();
    const mr=mrRef.current;
    if(!mr||mr.state==='inactive'){setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:false}:t));return;}
    mr.onstop=async()=>{
      const blob=new Blob(chunksRef.current,{type:'audio/webm'});
      let buf=null;
      try{buf=await getCtx().decodeAudioData(await blob.arrayBuffer());}catch{}
      if(!buf){setRecTracks(prev=>prev.map(t=>t.id===trackId?{...t,recording:false}:t));return;}
      setRecTracks(prev=>prev.map(t=>{
        if(t.id!==trackId)return t;
        const nextBar=t.blocks.reduce((m,b)=>Math.max(m,b.startBar+b.bars),1);
        return{...t,recording:false,blocks:[...t.blocks,{id:uid(),startBar:nextBar,bars:barsUsed,audioBuffer:buf,durationSec:buf.duration}]};
      }));
      recTrackIdRef.current=null; setBeatsDone(0); setBeatOn(false); setBeat(0);
      releaseMic(); // Release mic so iOS indicator disappears
    };
    mr.stop();
  }

  async function handleRecord(trackId){
    const stream=await getMic(); if(!stream)return;
    if(previewing){clearTimeout(previewTimerRef.current);setPreviewing(false);}
    setCountingIn(true); setBeatsDone(0);
    scheduleCountIn(audioStartT=>startActualRecording(trackId,stream,audioStartT));
  }
  function handleStop(trackId){
    if(countingIn){countInTimers.current.forEach(clearTimeout);setCountingIn(false);setBeat(0);setBeatOn(false);return;}
    finalizeRec(trackId,barsRef.current);
  }

  // ── Playback ────────────────────────────────────────────────────
  async function playAllImpl(rTracks,iTracks,overdub=false,loop=false){
    stopAllPlayback();
    const ctx=getCtx(), startAt=ctx.currentTime+0.05;
    const hasSolo=[...rTracks,...iTracks].some(t=>t.soloed);
    const nodes=[]; let maxDur=0;

    for(const track of rTracks){
      if(!track.blocks.length)continue;
      const isCurrentlyRec=track.id===recTrackIdRef.current;
      if(overdub&&isCurrentlyRec&&!track.selfMonitor)continue;
      const audible=overdub?true:(hasSolo?track.soloed:!track.muted);
      const bufs=track.blocks.map(b=>b.audioBuffer).filter(Boolean);
      if(!bufs.length)continue;
      let buf; try{buf=await concatBuffers(bufs,ctx.sampleRate);}catch{continue;}
      if(!buf)continue;
      if(buf.duration>maxDur)maxDur=buf.duration;
      const chain=buildFxChain(ctx,track.fx||defaultFx());
      const gain=ctx.createGain(); gain.gain.value=audible?1:0;
      chain.output.connect(gain); gain.connect(ctx.destination);
      const src=ctx.createBufferSource(); src.buffer=buf; src.loop=loop;
      src.connect(chain.input); src.start(startAt); nodes.push(src);
    }
    for(const track of iTracks){
      if(!track.audioBuffer)continue;
      const audible=overdub?true:(hasSolo?track.soloed:!track.muted);
      if(track.audioBuffer.duration>maxDur)maxDur=track.audioBuffer.duration;
      const chain=buildFxChain(ctx,track.fx||defaultFx());
      const gain=ctx.createGain(); gain.gain.value=audible?1:0;
      chain.output.connect(gain); gain.connect(ctx.destination);
      const src=ctx.createBufferSource(); src.buffer=track.audioBuffer; src.loop=loop;
      src.connect(chain.input); src.start(startAt); nodes.push(src);
    }
    playbackNodesRef.current=nodes;
    const has=nodes.length>0; setIsPlaying(has);
    if(has){
      startPlayhead(startAt,maxDur);
      if(!loop)setTimeout(()=>{setIsPlaying(false);setIsLooping(false);stopPlayhead();playbackNodesRef.current=[];},(maxDur+0.15)*1000);
    }
  }

  function handlePlayAll(){
    if(isPlayingRef.current||isLoopingRef.current){stopAllPlayback();return;}
    isPlayingRef.current=true;
    playAllImpl(recTracks,impTracks,false,false);
  }
  function handleLoopAll(){
    // Use refs for synchronous guard — prevents double-trigger on fast taps
    if(isLoopingRef.current||isPlayingRef.current){stopAllPlayback();return;}
    isLoopingRef.current=true; // set immediately before async playAllImpl
    playAllImpl(recTracks,impTracks,false,true);
    setIsLooping(true);
  }
  function handleStopAll(){
    if(previewing){clearTimeout(previewTimerRef.current);setPreviewing(false);setBeat(0);setBeatOn(false);}
    if(countingIn){countInTimers.current.forEach(clearTimeout);setCountingIn(false);setBeat(0);setBeatOn(false);return;}
    stopAllPlayback();
    const rec=recTracks.find(t=>t.recording); if(rec)handleStop(rec.id);
  }

  // ── Track management ────────────────────────────────────────────
  const mutRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,muted:!t.muted}:t));
  const solRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,soloed:!t.soloed}:t));
  const delRec=id=>setRecTracks(p=>p.filter(t=>t.id!==id));
  const delBlock=(tid,bid)=>setRecTracks(p=>p.map(t=>t.id===tid?{...t,blocks:t.blocks.filter(b=>b.id!==bid)}:t));
  const toggleSelfMonitor=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,selfMonitor:!t.selfMonitor}:t));
  const toggleFxRec=id=>setRecTracks(p=>p.map(t=>t.id===id?{...t,fxOpen:!t.fxOpen}:t));
  const changeFxRec=(id,fx)=>{
    setRecTracks(p=>p.map(t=>t.id===id?{...t,fx}:t));
    const track=recTracksRef.current.find(t=>t.id===id);
    if(track?.recording&&micStreamRef.current) startMonitor(micStreamRef.current,fx);
  };
  const mutImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,muted:!t.muted}:t));
  const solImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,soloed:!t.soloed}:t));
  const delImp=id=>setImpTracks(p=>p.filter(t=>t.id!==id));
  const clrImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,audioBuffer:null,filename:''}:t));
  const toggleFxImp=id=>setImpTracks(p=>p.map(t=>t.id===id?{...t,fxOpen:!t.fxOpen}:t));
  const changeFxImp=(id,fx)=>setImpTracks(p=>p.map(t=>t.id===id?{...t,fx}:t));
  const addRecTrack=()=>{if(recTracks.length<MAX_REC_TRACKS)setRecTracks(p=>[...p,makeRecTrack(p.length+1)]);};
  const addImpTrack=()=>{if(impTracks.length<MAX_IMP_TRACKS)setImpTracks(p=>[...p,makeImpTrack(p.length+1)]);};

  async function handleFileLoad(trackId,file){
    try{
      const buf=await getCtx().decodeAudioData(await file.arrayBuffer());
      setImpTracks(p=>p.map(t=>t.id===trackId?{...t,audioBuffer:buf,filename:file.name.replace(/\.[^.]+$/,'').slice(0,18)}:t));
    }catch{alert('音声ファイルのデコードに失敗しました。');}
  }

  const hasAny=[...recTracks.filter(t=>t.blocks.length>0),...impTracks.filter(t=>t.audioBuffer)].length>0;
  const totalBeatsDuringRec=bars*BEATS_PER_BAR;
  const maxDurSec=Math.max(...recTracks.map(t=>t.blocks.reduce((s,b)=>s+b.durationSec,0)),...impTracks.map(t=>t.audioBuffer?.duration||0),0.1);

  return(
    <div style={{minHeight:'100vh',background:'#090c16',
      backgroundImage:'radial-gradient(ellipse at 15% 15%,rgba(25,40,110,0.4) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(120,90,30,0.18) 0%,transparent 50%)',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'28px 12px 60px',
      fontFamily:"'Space Mono',monospace",color:'#e2e8f0'}}>

      {/* Header */}
      <div style={{textAlign:'center',marginBottom:24,display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        <div style={{width:80,height:80,borderRadius:20,overflow:'hidden',
          boxShadow:'0 0 0 1px rgba(180,150,80,0.28),0 4px 28px rgba(0,0,0,0.7),0 0 40px rgba(180,150,80,0.12)'}}>
          <img src={APP_ICON} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:'clamp(18px,5vw,34px)',fontWeight:800,letterSpacing:'-0.02em',
            background:'linear-gradient(135deg,#c8a96e 0%,#e8d5a0 50%,#b8935a 100%)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}>Harmony Layer Recorder</div>
          <div style={{fontSize:9,color:'#5c4a2a',letterSpacing:'0.16em'}}>MULTI-TRACK VOCAL OVERDUB · v7</div>
        </div>
      </div>

      {permDenied&&(
        <div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.24)',borderRadius:10,
          padding:'8px 14px',fontSize:11,color:'#f87171',marginBottom:16,maxWidth:500,textAlign:'center'}}>
          ⚠ マイクへのアクセスが拒否されました。ブラウザの設定で許可してください。
        </div>
      )}

      <TransportBar bpm={bpm} onBpm={setBpm} bars={bars} onBars={setBars} disabled={anyActive}
        onTap={handleTap} tapActive={tapActive} onPreview={handlePreview} previewing={previewing}/>
      {/* Mic sensitivity control */}
      <div style={{display:'flex',alignItems:'center',gap:10,
        background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',
        borderRadius:10,padding:'7px 14px',marginBottom:12,width:'100%',maxWidth:760}}>
        <span style={{fontSize:10,color:'#64748b',letterSpacing:'0.08em',minWidth:52}}>🎤 感度</span>
        <input type='range' min={0.1} max={3.0} step={0.05} value={micGain}
          onChange={e=>{const v=Number(e.target.value);setMicGain(v);micGainRef.current=v;if(micGainNodeRef.current)micGainNodeRef.current.gain.value=v;}}
          style={{flex:1,accentColor:GOLD}}/>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,
          color:micGain>2?RED:micGain>1.5?'#facc15':GOLD,minWidth:36,textAlign:'right'}}>
          {micGain>=2?'HIGH':micGain<=0.5?'LOW':Math.round(micGain*100)+'%'}
        </span>
        {micGain>2&&<span style={{fontSize:9,color:RED,fontFamily:'monospace'}}>⚠ 歪み注意</span>}
      </div>
      <BeatDisplay beat={beat} beatOn={beatOn} countingIn={countingIn} isRecording={isRecording}
        bpm={bpm} barCount={bars} beatsDone={beatsDone} totalBeats={totalBeatsDuringRec}/>

      <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
        <GBtn onClick={handlePlayAll} color={isPlaying?'#facc15':GREEN} glow={isPlaying?'rgba(250,204,21,0.25)':'rgba(74,222,128,0.22)'} disabled={!hasAny||anyActive} active={isPlaying}>
          {isPlaying?'⏸ PAUSE':'▶ PLAY ALL'}
        </GBtn>
        <GBtn onClick={handleLoopAll} color={GOLD} glow='rgba(200,169,110,0.28)' disabled={!hasAny||anyActive} active={isLooping}>
          {isLooping?'↺ ループ中':'↺ LOOP ALL'}
        </GBtn>
        <GBtn onClick={handleStopAll} color={isLooping?RED:'#94a3b8'} glow={isLooping?'rgba(239,68,68,0.35)':'rgba(148,163,184,0.08)'} disabled={!isPlaying&&!isLooping&&!anyActive} active={isLooping}>{isLooping?'⏹ ループ停止':'⏹ STOP'}</GBtn>
      </div>

      <div style={{width:'100%',maxWidth:760}}>
        <div style={{display:'flex',marginBottom:2}}>
          <div style={{width:110,flexShrink:0,fontSize:9,color:'#6b7280',fontFamily:'monospace',letterSpacing:'0.1em',paddingLeft:4,display:'flex',alignItems:'center'}}>🎤 録音トラック</div>
          <div style={{overflowX:'hidden',flex:1}}><TimelineRuler totalBars={totalBars} cellW={cellW}/></div>
        </div>
        <div style={{overflowX:'auto'}}>
          {recTracks.map(track=>(
            <div key={track.id} style={{minWidth:110+totalBars*cellW}}>
              <RecTrackRow track={track} totalBars={totalBars} cellW={cellW} bpm={bpm} bars={bars}
                anyRecording={isRecording} countingIn={countingIn}
                onRecord={()=>handleRecord(track.id)} onStop={()=>handleStop(track.id)}
                onMute={()=>mutRec(track.id)} onSolo={()=>solRec(track.id)} onDelete={()=>delRec(track.id)}
                onDeleteBlock={bid=>delBlock(track.id,bid)}
                onToggleSelfMonitor={()=>toggleSelfMonitor(track.id)}
                onToggleFx={()=>toggleFxRec(track.id)}
                onChangeFx={fx=>changeFxRec(track.id,fx)}
                micStream={micStream} playTimeSec={playPos}/>
            </div>
          ))}
        </div>
        {recTracks.length<MAX_REC_TRACKS&&<AddBtn onClick={addRecTrack} label='＋ 録音トラックを追加'/>}

        <div style={{marginTop:16,marginBottom:2,fontSize:9,color:'#6b7280',fontFamily:'monospace',letterSpacing:'0.1em',paddingLeft:4}}>♪ インポートトラック</div>
        {impTracks.map(track=>(
          <ImpTrackRow key={track.id} track={track} totalBars={totalBars} cellW={cellW}
            onFileLoad={f=>handleFileLoad(track.id,f)}
            onMute={()=>mutImp(track.id)} onSolo={()=>solImp(track.id)}
            onDelete={()=>delImp(track.id)} onClear={()=>clrImp(track.id)}
            onToggleFx={()=>toggleFxImp(track.id)}
            onChangeFx={fx=>changeFxImp(track.id,fx)}
            playTimeSec={playPos}/>
        ))}
        {impTracks.length<MAX_IMP_TRACKS&&<AddBtn onClick={addImpTrack} label='＋ インポートトラックを追加'/>}
      </div>

      <WavePanel recTracks={recTracks} impTracks={impTracks} playPos={playPos} isLooping={isLooping} maxDur={maxDurSec}/>

      <div style={{marginTop:24,fontSize:9,color:'#64748b',letterSpacing:'0.08em',textAlign:'center',lineHeight:2}}>
        ⏺ 録音 ｜ ■ 停止 ｜ FX エフェクト ｜ M ミュート ｜ S ソロ ｜ ↑ ファイル読込 ｜ ↺ ループ
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
